<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Antigravity Feedback Pro - Ultimate</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>

<script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script defer src="https://player.vimeo.com/api/player.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
  --bg-deep: #050505;
  --accent-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
  --accent-solid: #8b5cf6;
  --glass: rgba(255, 255, 255, 0.03);
  --border: rgba(255, 255, 255, 0.1);
  --text-sec: #a1a1aa;
  --red: #ef4444;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg-deep); color: #fff; line-height: 1.5; overflow-x: hidden; }

.app { max-width: 1600px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: 1fr 420px; gap: 2rem; }
@media(max-width: 1100px) { .app { grid-template-columns: 1fr; } }

.bento { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; }

/* Video Area */
.video-main { position: sticky; top: 2rem; }
.v-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; border-radius: 24px; overflow: hidden; }
#yt-frame, #vimeo-frame, video#dv { width: 100%; height: 100%; position: absolute; top:0; left:0; }

.tc-bar { margin-top: 1rem; padding: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
.tc-clock { font-size: 40px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -2px; }

/* Right Panel */
.panel { display: flex; flex-direction: column; gap: 1.5rem; }
input, textarea { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 12px; font-family: inherit; outline: none; transition: 0.2s; }
input:focus, textarea:focus { border-color: var(--accent-solid); }

.time-row { display: flex; gap: 10px; margin-bottom: 12px; }
.tc-box { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 12px; text-align: center; cursor: pointer; position: relative; transition: 0.2s; }
.tc-box.active { border-color: var(--accent-solid); background: rgba(139, 92, 246, 0.1); transform: scale(1.02); }
.tc-label { display: block; font-size: 10px; font-weight: 800; color: var(--text-sec); margin-bottom: 4px; text-transform: uppercase; pointer-events: none; }
.tc-box.active .tc-label { color: var(--accent-solid); }
.tc-val { font-size: 22px; font-weight: 800; pointer-events: none; font-variant-numeric: tabular-nums; }
.btn-clear-b { position: absolute; top: 8px; right: 8px; width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; cursor: pointer; }

.snip-preview { margin-top: 10px; border: 1px dashed var(--border); border-radius: 12px; min-height: 50px; position: relative; cursor: pointer; text-align: center; padding: 10px; }
.snip-preview img { max-width: 100%; border-radius: 8px; display: none; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

.btn { padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-primary { background: var(--accent-grad); color: #fff; width: 100%; }
.btn-primary:hover { filter: brightness(1.1); }
.btn-load { background: #333; color: #fff; width: auto; font-size: 13px; }

.fb-list { overflow-y: auto; max-height: 500px; padding-right: 5px; }
.fb-item { padding: 1.5rem; border-bottom: 1px solid var(--border); position: relative; }
.fb-tc { display: inline-block; padding: 4px 12px; background: var(--accent-solid); border-radius: 100px; font-size: 12px; font-weight: 800; margin-bottom: 10px; cursor: pointer; }

/* CROP OVERLAY */
#crop-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: none; cursor: crosshair; }
#crop-canvas { max-width: 100%; max-height: 100%; margin: auto; display: block; }

.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #18181b; padding: 12px 24px; border-radius: 100px; border: 1px solid #3f3f46; opacity: 0; transition: 0.3s; z-index: 10000; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="crop-overlay">
    <canvas id="crop-canvas"></canvas>
</div>

<div class="app">
  <div class="video-main">
    <div class="v-container bento" id="vBox">
        <div id="v-msg" style="padding: 20%; text-align: center; color: var(--text-sec)">Nhập link và nhấn Load Video</div>
        <div id="yt-frame"></div><div id="vimeo-frame"></div><video id="dv" controls></video>
    </div>
    
    <div class="tc-bar bento">
      <div class="tc-clock" id="tcClock">00:00:00</div>
      <div style="text-align: right">
          <div style="color: var(--accent-solid); font-weight: 800; font-size: 11px;">SYNC STATUS: LIVE</div>
          <div style="color: var(--text-sec); font-size: 13px;">Antigravity System</div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="bento" style="padding: 1.5rem; display: flex; flex-direction: column; gap: 10px;">
        <div style="display: flex; gap: 8px;">
            <input type="text" id="urlInput" placeholder="Dán link Video (YouTube/Drive/Vimeo)...">
            <button class="btn btn-load" onclick="loadVideo()">Load</button>
        </div>
        <input type="text" id="reportName" placeholder="Tên báo cáo (Tự động lấy)..." style="border-color: rgba(139, 92, 246, 0.3); font-weight: 700;">
    </div>

    <div class="fb-editor bento">
      <div style="padding: 1.5rem;">
        <div class="time-row">
          <div class="tc-box active" id="boxA" onclick="setSync('A')">
            <span class="tc-label">Từ (A)</span>
            <div class="tc-val" id="valA">00:00:00</div>
          </div>
          <div class="tc-box" id="boxB" onclick="setSync('B')">
            <span class="tc-label">Đến (B)</span>
            <div class="tc-val" id="valB">--:--:--</div>
            <span class="btn-clear-b" onclick="clearB(event)">✕</span>
          </div>
        </div>

        <textarea id="noteText" placeholder="Nội dung nhận xét..." rows="4" onfocus="setSync(null)"></textarea>
        <textarea id="sourceLinks" placeholder="Dán các link tham chiếu (Figma, Notion...)" rows="2" style="margin-top:10px; font-size: 12px;"></textarea>

        <button class="btn" style="background:#3b82f6; width:100%; margin-top:10px;" onclick="initSnip()">📸 Snip Vùng Ảnh</button>
        <div class="snip-preview" id="snipZone" onclick="document.getElementById('fileIn').click()">
            <span id="snipHint" style="font-size: 12px; color: var(--text-sec)">Hoặc Ctrl+V để dán ảnh</span>
            <img src="" id="pImg"/>
        </div>
        <input type="file" id="fileIn" hidden onchange="handleFile(event)">

        <button class="btn btn-primary" style="margin-top:1rem" onclick="saveFb()">Lưu Feedback (Ctrl + Enter)</button>
      </div>
      <div class="fb-list" id="fbList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let feedbacks = [], videoType = '', videoId = '', videoUrl = '', syncTarget = 'A', currentImg = null, ytPlayer = null;

function toast(m){ 
    const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2000);
}

function fmt(s){
    s=Math.floor(s||0);
    return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(v=>String(v).padStart(2,'0')).join(':');
}

function setSync(t){
    syncTarget = t;
    document.getElementById('boxA').classList.toggle('active', t==='A');
    document.getElementById('boxB').classList.toggle('active', t==='B');
}

function clearB(e){
    if(e) e.stopPropagation();
    document.getElementById('valB').innerText = '--:--:--';
    setSync('A');
}

function getTime(){
    if(videoType === 'native') return document.getElementById('dv').currentTime;
    if(videoType === 'yt' && ytPlayer?.getCurrentTime) return ytPlayer.getCurrentTime();
    return 0;
}

setInterval(() => {
    const now = getTime();
    document.getElementById('tcClock').innerText = fmt(now);
    if(syncTarget === 'A') document.getElementById('valA').innerText = fmt(now);
    if(syncTarget === 'B') document.getElementById('valB').innerText = fmt(now);
}, 200);

function loadVideo(){
    const url = document.getElementById('urlInput').value.trim();
    if(!url) return;
    videoUrl = url;
    document.getElementById('v-msg').style.display='none';
    document.getElementById('dv').style.display='none';
    document.getElementById('yt-frame').style.display='none';
    document.getElementById('yt-frame').innerHTML = '';

    if(url.includes('youtube.com') || url.includes('youtu.be')){
        videoType = 'yt';
        videoId = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
        document.getElementById('yt-frame').style.display='block';
        document.getElementById('yt-frame').innerHTML = '<div id="player"></div>';
        ytPlayer = new YT.Player('player', {
            height: '100%', width: '100%', videoId: videoId,
            events: {
                'onReady': (event) => {
                    // Tự động lấy tên video YouTube
                    const title = event.target.getVideoData().title;
                    if(title) document.getElementById('reportName').value = title;
                }
            }
        });
    } else {
        videoType = 'native';
        const v = document.getElementById('dv'); 
        v.style.display='block'; v.src = url;
        document.getElementById('reportName').value = "Báo cáo video Local";
    }
    toast("🚀 Đã tải video!");
}

async function initSnip() {
    try {
        const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        const video = document.createElement("video");
        video.srcObject = stream; video.play();
        video.onloadedmetadata = () => {
            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext("2d").drawImage(video, 0, 0);
            stream.getTracks().forEach(t => t.stop());
            startCrop(canvas);
        };
    } catch (e) { toast("Hủy chụp"); }
}

function startCrop(fullCanvas) {
    const overlay = document.getElementById('crop-overlay');
    const canvas = document.getElementById('crop-canvas');
    const ctx = canvas.getContext('2d');
    overlay.style.display = 'flex';
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    ctx.drawImage(fullCanvas, 0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0,0, canvas.width, canvas.height);

    let startX, startY, isDrawing = false;
    canvas.onmousedown = (e) => { startX = e.clientX; startY = e.clientY; isDrawing = true; };
    canvas.onmousemove = (e) => {
        if(!isDrawing) return;
        ctx.clearRect(0,0, canvas.width, canvas.height);
        ctx.drawImage(fullCanvas, 0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0,0, canvas.width, canvas.height);
        ctx.clearRect(startX, startY, e.clientX - startX, e.clientY - startY);
        ctx.drawImage(fullCanvas, 
            (startX/canvas.width)*fullCanvas.width, (startY/canvas.height)*fullCanvas.height, 
            ((e.clientX-startX)/canvas.width)*fullCanvas.width, ((e.clientY-startY)/canvas.height)*fullCanvas.height,
            startX, startY, e.clientX - startX, e.clientY - startY
        );
    };
    canvas.onmouseup = (e) => {
        isDrawing = false;
        const cropCanvas = document.createElement('canvas');
        const w = e.clientX - startX, h = e.clientY - startY;
        cropCanvas.width = Math.abs(w); cropCanvas.height = Math.abs(h);
        cropCanvas.getContext('2d').drawImage(fullCanvas, 
            (startX/canvas.width)*fullCanvas.width, (startY/canvas.height)*fullCanvas.height, 
            (w/canvas.width)*fullCanvas.width, (h/canvas.height)*fullCanvas.height,
            0, 0, cropCanvas.width, cropCanvas.height
        );
        currentImg = cropCanvas.toDataURL();
        document.getElementById('pImg').src = currentImg;
        document.getElementById('pImg').style.display = 'block';
        document.getElementById('snipHint').style.display = 'none';
        overlay.style.display = 'none';
        setSync(null); document.getElementById('noteText').focus();
    };
}

function saveFb(){
    const note = document.getElementById('noteText').value.trim();
    if(!note && !currentImg) return toast("⚠️ Nhập nội dung!");
    let tA = document.getElementById('valA').innerText;
    let tB = document.getElementById('valB').innerText;
    const secA = tA.split(':').reduce((acc, t) => (60 * acc) + +t, 0);
    const secB = tB === '--:--:--' ? null : tB.split(':').reduce((acc, t) => (60 * acc) + +t, 0);
    
    if(secB !== null && secB < secA) [tA, tB] = [tB, tA];
    const timeDisplay = (tB === '--:--:--') ? tA : `${tA} - ${tB}`;
    const links = document.getElementById('sourceLinks').value.match(/\bhttps?:\/\/\S+/gi) || [];

    feedbacks.push({ id: Date.now(), tc: timeDisplay, sec: secA, note, img: currentImg, links });
    render();
    resetEditor();
}

function resetEditor(){
    document.getElementById('noteText').value = '';
    document.getElementById('sourceLinks').value = '';
    document.getElementById('valB').innerText = '--:--:--';
    document.getElementById('pImg').style.display = 'none';
    document.getElementById('snipHint').style.display = 'block';
    currentImg = null; setSync('A');
}

function render(){
    const list = document.getElementById('fbList');
    list.innerHTML = feedbacks.sort((a,b)=>a.sec - b.sec).map(f => `
        <div class="fb-item">
            <div class="fb-tc">▶ ${f.tc}</div>
            <div style="font-size:14px">${f.note}</div>
            ${f.img ? `<img src="${f.img}" style="max-width:100%; margin-top:10px; border-radius:8px">` : ''}
            <div style="display:flex; gap:5px; margin-top:8px">
                ${f.links.map(l => `<a href="${l}" target="_blank" style="font-size:10px; color:var(--accent-solid)">🔗 Link</a>`).join('')}
            </div>
        </div>
    `).join('');
}

document.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && e.ctrlKey) saveFb();
    if(document.activeElement.tagName !== 'TEXTAREA' && (e.key === 'Delete' || e.key === 'Backspace')) clearB();
});

document.addEventListener('paste', (e) => {
    const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
    if(item){
        const reader = new FileReader();
        reader.onload = (ex) => { currentImg = ex.target.result; document.getElementById('pImg').src = currentImg; document.getElementById('pImg').style.display='block'; document.getElementById('snipHint').style.display='none'; setSync(null); };
        reader.readAsDataURL(item.getAsFile());
    }
});

var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0]; firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
</script>
</body>
</html>
