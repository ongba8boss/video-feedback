<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Antigravity — MinXLabs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://player.vimeo.com/api/player.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root {
  --bg:         #080809;
  --surface:  #0f0f12;
  --panel:    #141418;
  --card:     #1a1a20;
  --line:     rgba(255,255,255,0.06);
  --line2:    rgba(255,255,255,0.10);
  --accent:    #4f7fff;
  --accent-d: rgba(79,127,255,0.10);
  --green:    #34d399;
  --red:      #f87171;
  --ink:      #e8e8f0;
  --ink2:     #9090a8;
  --ink3:     #50505f;
  --mono:     'Geist Mono', monospace;
  --sans:     'Sora', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--sans); background: var(--bg); color: var(--ink); display: flex; flex-direction: column; }

/* ── HEADER ── */
header {
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  gap: 20px;
  flex-shrink: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.logo-mark {
  width: 26px; height: 26px;
  border: 1.5px solid var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent);
}
.logo-text { font-family: var(--mono); font-size: 11px; font-weight: 400; letter-spacing: 3px; text-transform: uppercase; color: var(--ink); }

/* Updated Header Center (YouTube Style) */
.header-center {
  flex: 0 1 640px; /* Max width like YT Search */
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.report-row { display: flex; align-items: center; gap: 7px; }
.report-icon { color: var(--ink3); flex-shrink: 0; }
#reportName { font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--ink); background: none; border: none; outline: none; flex: 1; caret-color: var(--accent); }

.url-row { 
  display: flex; align-items: center; gap: 4px; 
  background: var(--panel); 
  border: 1px solid var(--line2); 
  border-radius: 100px; 
  padding: 2px 4px 2px 14px;
}
.url-row svg { color: var(--ink3); flex-shrink: 0; }
#urlInput {
  font-family: var(--mono); font-size: 11px; color: var(--ink2);
  background: none; border: none; outline: none;
  flex: 1; min-width: 0; height: 26px;
}
#urlInput:focus { color: var(--ink); }
.btn-load {
  font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 1px;
  color: var(--ink); background: rgba(255,255,255,0.05);
  border: 1px solid var(--line2);
  padding: 0 14px; height: 24px; border-radius: 100px;
  cursor: pointer; transition: all .15s;
}
.btn-load:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.h-btn { height: 32px; padding: 0 14px; font-family: var(--sans); font-size: 11.5px; font-weight: 500; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all .15s; white-space: nowrap; }
.h-btn-ghost { background: none; border: 1px solid var(--line2); color: var(--ink2); }
.h-btn-ghost:hover { background: var(--card); color: var(--ink); }
.h-btn-accent { background: var(--accent-d); border: 1px solid rgba(79,127,255,0.3); color: var(--accent); }
.h-btn-accent:hover { background: var(--accent); color: #fff; }

.icon-btn { width: 32px; height: 32px; border-radius: 8px; background: none; border: 1px solid var(--line2); color: var(--ink2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; }
.icon-btn:hover { background: var(--card); color: var(--ink); }
.h-divider { width: 1px; height: 18px; background: var(--line2); }

/* ── DROPDOWN ── */
.dropdown { position: relative; }
.dd-menu { position: absolute; right: 0; top: calc(100% + 6px); background: rgba(18,18,22,0.98); backdrop-filter: blur(20px); border: 1px solid var(--line2); border-radius: 10px; padding: 5px; min-width: 185px; display: none; z-index: 300; box-shadow: 0 12px 32px rgba(0,0,0,.6); }
.dd-menu.open { display: block; }
.dd-item { padding: 8px 10px; font-size: 12.5px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--ink2); transition: all .12s; }
.dd-item:hover { background: var(--accent-d); color: var(--ink); }

/* ── MAIN & SIDEBAR ── */
main { display: flex; flex: 1; overflow: hidden; }
.workspace { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 10px; overflow: hidden; }
.video-wrap { flex: 1; background: #000; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid var(--line); }
.video-wrap iframe, .video-wrap video { width: 100%; height: 100%; position: absolute; border: none; }
.video-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--ink3); font-size: 12px; }
.video-placeholder .big-icon { font-size: 30px; opacity: .18; }
.help-bar { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; height: 38px; display: flex; align-items: center; padding: 0 14px; overflow-x: auto; flex-shrink: 0; }
.help-items { display: flex; align-items: center; white-space: nowrap; gap: 12px; }
.help-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--ink2); }
.help-item kbd { font-family: var(--mono); font-size: 9px; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.13); color: var(--ink); padding: 2px 6px; border-radius: 4px; }
.help-sep { width: 1px; height: 12px; background: var(--line2); flex-shrink: 0; }

.sidebar { width: 380px; flex-shrink: 0; border-left: 1px solid var(--line); background: var(--surface); display: flex; flex-direction: column; }
.sidebar-top { padding: 16px; border-bottom: 1px solid var(--line); }
.proj-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.proj-title { font-size: 12px; font-weight: 500; color: var(--ink2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
.progress-badge { font-family: var(--mono); font-size: 10px; color: var(--accent); background: var(--accent-d); padding: 2px 8px; border-radius: 4px; }
.tc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.tc-pill { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: all .15s; }
.tc-pill.active { border-color: var(--accent); background: var(--accent-d); }
.tc-pill .lbl { font-size: 8px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink3); margin-bottom: 4px; }
.tc-pill .val { font-family: var(--mono); font-size: 14px; color: var(--ink); }
.field { width: 100%; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 11px; color: var(--ink); font-family: var(--sans); font-size: 13px; line-height: 1.5; resize: none; outline: none; margin-bottom: 8px; }
.field:focus { border-color: rgba(79,127,255,.4); }
.save-btn { height: 38px; background: var(--accent); border: none; color: #fff; font-family: var(--sans); font-size: 13px; font-weight: 600; border-radius: 10px; cursor: pointer; width: 100%; transition: opacity .15s; margin-top: 4px; }
.save-btn:hover { opacity: .9; }
#pImg { max-width: 100%; border-radius: 8px; display: none; margin-top: 10px; border: 1px solid var(--line); }

.cell-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.fb-card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px; transition: all .2s; }
.fb-card.done { opacity: 0.3; filter: grayscale(1); }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.tc-badge { font-family: var(--mono); font-size: 10px; background: var(--accent-d); color: var(--accent); padding: 3px 10px; border-radius: 6px; cursor: pointer; }
.card-act { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(255,255,255,0.03); border: 1px solid var(--line); color: var(--ink3); transition: all .15s; }
.card-act:hover { color: var(--ink); background: var(--line2); }

/* ── FOOTER ── */
footer { height: 32px; background: var(--surface); border-top: 1px solid var(--line); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.footer-water { font-family: var(--mono); font-size: 9px; color: var(--ink3); letter-spacing: 1.5px; display: flex; align-items: center; gap: 8px; }
.toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(10px); background: #1a1a20; border: 1px solid var(--line2); color: #fff; font-size: 12px; padding: 10px 20px; border-radius: 100px; opacity: 0; pointer-events: none; transition: all .2s; z-index: 1000; backdrop-filter: blur(10px); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    <span class="logo-text">Antigravity</span>
  </div>

  <div class="header-center">
    <div class="report-row">
      <svg class="report-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <input id="reportName" type="text" placeholder="Tên báo cáo..." spellcheck="false">
    </div>
    <div class="url-row">
      <input type="text" id="urlInput" placeholder="Dán link video (YouTube/Drive...) và nhấn Enter" onkeydown="if(event.key==='Enter') loadVideo()">
      <button class="btn-load" onclick="loadVideo()">LOAD</button>
    </div>
  </div>

  <div class="header-right">
    <button class="h-btn h-btn-accent" onclick="copyShareLink()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        Share
    </button>
    <div class="h-divider"></div>
    <div class="dropdown">
        <button class="h-btn h-btn-ghost" onclick="toggleMenu('exportMenu')">Export</button>
        <div class="dd-menu" id="exportMenu">
            <div class="dd-item" onclick="exportPDF()">📄 PDF Report</div>
            <div class="dd-item" onclick="exportXLSX()">📊 Excel (.xlsx)</div>
        </div>
    </div>
    <div class="icon-btn" onclick="toggleMenu('moreMenu')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    </div>
    <div class="dd-menu" id="moreMenu">
        <div class="dd-item" onclick="exportJSON()">💾 Save Session</div>
        <div class="dd-item" onclick="document.getElementById('importIn').click()">📂 Open Session</div>
    </div>
  </div>
  <input type="file" id="importIn" hidden accept=".json" onchange="importJSON(event)">
</header>

<main>
  <section class="workspace">
    <div class="video-wrap" id="vBox">
      <div id="yt-frame"></div>
      <iframe id="drive-frame" style="display:none" allowfullscreen></iframe>
      <video id="dv" controls style="display:none"></video>
      <div class="video-placeholder" id="v-msg">
        <div class="big-icon">▶</div>
        <span>Sẵn sàng để Antigravity...</span>
      </div>
    </div>
    <div class="help-bar">
      <div class="help-items">
        <div class="help-item"><kbd>Ctrl+V</kbd><span>Dán ảnh</span></div>
        <div class="help-sep"></div>
        <div class="help-item"><kbd>Space</kbd><span>Play/Pause</span></div>
        <div class="help-sep"></div>
        <div class="help-item"><kbd>← →</kbd><span>±1s</span></div>
        <div class="help-sep"></div>
        <div class="help-item"><kbd>Ctrl+↵</kbd><span>Lưu nhanh</span></div>
      </div>
    </div>
  </section>

  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="proj-row">
        <div class="proj-title" id="projTitle">—</div>
        <div class="progress-badge" id="progressBadge">0 / 0</div>
      </div>
      <div class="tc-row">
        <div class="tc-pill active" id="boxA" onclick="setSync('A')">
          <div class="lbl">Điểm A</div>
          <div class="val" id="valA">00:00:00</div>
        </div>
        <div class="tc-pill" id="boxB" onclick="setSync('B')">
          <div class="lbl">Điểm B (Khoảng)</div>
          <div class="val" id="valB">--:--:--</div>
        </div>
      </div>
      <textarea id="noteText" class="field" placeholder="Ghi chú feedback tại đây..." rows="3"></textarea>
      <input type="file" id="fileIn" hidden accept="image/*" onchange="handleFile(event)">
      <button class="save-btn" onclick="saveFb()">+ Thêm Nhận Xét</button>
      <img id="pImg"/>
    </div>
    <div class="cell-list" id="fbList"></div>
  </aside>
</main>

<div class="toast" id="toast"></div>

<script>
let feedbacks = [], videoType = '', videoUrl = '', syncTarget = 'A', currentImg = null, ytPlayer = null;

function toast(m) {
  const t = document.getElementById('toast');
  t.innerText = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function fmt(s) {
  s = Math.floor(s || 0);
  return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(v => String(v).padStart(2,'0')).join(':');
}

function toggleMenu(id) {
  document.querySelectorAll('.dd-menu').forEach(el => { if (el.id !== id) el.classList.remove('open'); });
  document.getElementById(id).classList.toggle('open');
}

function setSync(t) {
  syncTarget = t;
  document.getElementById('boxA').classList.toggle('active', t === 'A');
  document.getElementById('boxB').classList.toggle('active', t === 'B');
}

setInterval(() => {
  const now = getTime();
  if (syncTarget === 'A') document.getElementById('valA').innerText = fmt(now);
  if (syncTarget === 'B') document.getElementById('valB').innerText = fmt(now);
}, 200);

function getTime() {
  if (videoType === 'native') return document.getElementById('dv').currentTime || 0;
  if (videoType === 'yt' && ytPlayer?.getCurrentTime) return ytPlayer.getCurrentTime();
  return 0;
}

function setTime(sec) {
  if (videoType === 'native') document.getElementById('dv').currentTime = sec;
  if (videoType === 'yt' && ytPlayer) ytPlayer.seekTo(sec, true);
}

function loadVideo() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  videoUrl = url;
  
  // Clear UI
  ['v-msg','dv','yt-frame','drive-frame'].forEach(id => {
      const el = document.getElementById(id);
      if(el) { el.style.display = 'none'; if(id==='yt-frame') el.innerHTML = ''; }
  });

  if (url.includes('youtube.com') || url.includes('youtu.be')) {
    videoType = 'yt';
    const id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop().split('?')[0];
    document.getElementById('yt-frame').style.display = 'block';
    document.getElementById('yt-frame').innerHTML = '<div id="player" style="width:100%;height:100%"></div>';
    ytPlayer = new YT.Player('player', {
      videoId: id, playerVars: { rel: 0 },
      events: { onReady: e => { 
          document.getElementById('projTitle').innerText = e.target.getVideoData().title;
          autoLoad(); 
      }}
    });
  } else if (url.includes('drive.google.com')) {
    videoType = 'drive';
    document.getElementById('drive-frame').style.display = 'block';
    const m = url.match(/\/file\/d\/([^\/]+)\//);
    document.getElementById('drive-frame').src = `https://drive.google.com/file/d/${m?m[1]:''}/preview`;
    document.getElementById('projTitle').innerText = "Google Drive Video";
    autoLoad();
  } else {
    videoType = 'native';
    const v = document.getElementById('dv');
    v.style.display = 'block'; v.src = url;
    document.getElementById('projTitle').innerText = url.split('/').pop();
    autoLoad();
  }
}

function autoLoad() {
  const saved = localStorage.getItem('ag_v9_' + videoUrl);
  feedbacks = saved ? JSON.parse(saved).feedbacks : [];
  render();
}

function saveFb() {
  const note = document.getElementById('noteText').value.trim();
  if (!note && !currentImg) { toast('Nhập nội dung trước!'); return; }
  
  let tA = document.getElementById('valA').innerText;
  let tB = document.getElementById('valB').innerText;
  const secA = tA.split(':').reduce((a,v) => a*60 + +v, 0);
  
  feedbacks.push({ 
      id: Date.now(), 
      tc: tB !== '--:--:--' ? `${tA} → ${tB}` : tA, 
      sec: secA, note, img: currentImg, done: false 
  });
  
  render();
  document.getElementById('noteText').value = '';
  document.getElementById('pImg').style.display = 'none';
  currentImg = null;
  document.getElementById('valB').innerText = '--:--:--';
  setSync('A');
  localStorage.setItem('ag_v9_' + videoUrl, JSON.stringify({ feedbacks }));
  toast('✓ Đã lưu');
}

function render() {
  const list = document.getElementById('fbList');
  document.getElementById('progressBadge').innerText = `${feedbacks.filter(f=>f.done).length} / ${feedbacks.length}`;
  
  list.innerHTML = [...feedbacks].sort((a,b)=>a.sec-b.sec).map(f=>`
    <div class="fb-card ${f.done?'done':''}">
      <div class="card-header">
        <div class="tc-badge" onclick="setTime(${f.sec})">${f.tc}</div>
        <div style="display:flex; gap:6px">
            <div class="card-act" onclick="toggleDone(${f.id})">✓</div>
            <div class="card-act" onclick="delFb(${f.id})">✕</div>
        </div>
      </div>
      <div class="card-note">${f.note}</div>
      ${f.img ? `<img src="${f.img}" style="width:100%; border-radius:6px; margin-top:8px">` : ''}
    </div>`).join('');
}

function toggleDone(id) { 
    const f = feedbacks.find(x=>x.id===id); 
    if(f){ f.done=!f.done; render(); localStorage.setItem('ag_v9_' + videoUrl, JSON.stringify({ feedbacks })); } 
}

function delFb(id) { 
    feedbacks = feedbacks.filter(f=>f.id!==id); 
    render(); 
    localStorage.setItem('ag_v9_' + videoUrl, JSON.stringify({ feedbacks })); 
}

/* ── SHARE FEATURE ── */
function copyShareLink() {
    const url = document.getElementById('urlInput').value.trim();
    if(!url) { toast('❌ Cần có link video để share'); return; }
    
    const shareUrl = new URL(window.location.href.split('?')[0]);
    shareUrl.searchParams.set('video', url);
    
    navigator.clipboard.writeText(shareUrl.toString()).then(() => {
        toast('🚀 Đã copy link share kèm video!');
    });
}

window.addEventListener('load', () => {
    const params = new URLSearchParams(window.location.search);
    const vParam = params.get('video');
    if(vParam) {
        document.getElementById('urlInput').value = vParam;
        setTimeout(loadVideo, 1000); // Wait for YT API
    }
});

/* ── EXTERNAL LIBRARIES STUBS ── */
function exportXLSX() { toast('📊 Đang xuất Excel...'); /* Integration from previous code */ }
function exportPDF() { toast('📄 Đang xuất PDF...'); /* Integration from previous code */ }

// Paste Image Logic
document.addEventListener('paste', e => {
  const item = Array.from(e.clipboardData.items).find(x=>x.type.startsWith('image/'));
  if (item) {
    const reader = new FileReader();
    reader.onload = ex => { 
        currentImg=ex.target.result; 
        document.getElementById('pImg').src=currentImg; 
        document.getElementById('pImg').style.display='block'; 
    };
    reader.readAsDataURL(item.getAsFile());
  }
});

// YouTube API
var tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);
</script>
</body>
</html>
