<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Antigravity | iOS Video Notebook Pro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://player.vimeo.com/api/player.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
  --system-bg: #000000;
  --system-secondary-bg: #1C1C1E;
  --system-tertiary-bg: #2C2C2E;
  --system-blue: #0A84FF;
  --system-green: #30D158;
  --label-primary: #FFFFFF;
  --label-secondary: #8E8E93;
  --glass: rgba(28, 28, 30, 0.85);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Inter', -apple-system, sans-serif; 
  background-color: var(--system-bg); color: var(--label-primary); 
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
}

/* --- HEADER --- */
header {
  height: 64px; backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
  background: var(--glass); border-bottom: 0.5px solid rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.5rem; z-index: 2000;
}
.logo { font-weight: 700; font-size: 1rem; display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px; }

.url-section { display: flex; align-items: center; gap: 10px; transition: 0.3s; }
.url-input { 
    background: var(--system-tertiary-bg); border: none; color: #fff; 
    padding: 10px 16px; border-radius: 12px; width: 320px; font-size: 13px; outline: none;
    transition: 0.3s;
}
.url-section.active .url-input { width: 40px; padding: 10px 0; text-align: center; opacity: 0.1; }

/* --- MORE MENU (Apple Style) --- */
.more-container { position: relative; }
.dropdown-menu {
    position: absolute; right: 0; top: 45px; background: rgba(44, 44, 46, 0.95);
    backdrop-filter: blur(30px); border-radius: 14px; width: 260px;
    padding: 8px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    display: none; z-index: 2100; border: 0.5px solid rgba(255,255,255,0.1);
}
.dropdown-menu.show { display: block; }
.menu-group { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 0.5px solid rgba(255,255,255,0.1); }
.menu-group:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.menu-label { font-size: 10px; font-weight: 800; color: var(--label-secondary); padding: 4px 12px; text-transform: uppercase; }
.menu-item {
    padding: 10px 12px; font-size: 14px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between; transition: 0.2s;
}
.menu-item:hover { background: var(--system-blue); color: #fff; }
.menu-item span.shortcut { font-size: 11px; opacity: 0.5; font-family: 'JetBrains Mono', monospace; }

/* --- MAIN WORKSPACE --- */
main { display: flex; flex: 1; overflow: hidden; }
.workspace { flex: 1; padding: 2rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.5rem; }
.v-viewport { 
    background: #000; border-radius: 20px; overflow: hidden; aspect-ratio: 16/9; 
    position: relative; box-shadow: 0 40px 100px rgba(0,0,0,0.7); 
}
#yt-frame, #drive-frame, #vimeo-frame, video#dv { width: 100%; height: 100%; position: absolute; border: none; }

.tc-live { font-family: 'JetBrains Mono', monospace; font-size: 3.5rem; font-weight: 600; letter-spacing: -4px; text-align: center; }

/* --- SIDEBAR --- */
.sidebar { width: 440px; background: var(--system-secondary-bg); border-left: 0.5px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
.sidebar-header { padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
.sidebar-header h2 { font-size: 20px; font-weight: 700; }

.editor-area { padding: 0 1.5rem 1.5rem; }
.pill-group { display: flex; gap: 8px; margin-bottom: 1.2rem; }
.pill { 
    flex: 1; background: var(--system-tertiary-bg); padding: 12px; border-radius: 14px; 
    text-align: center; cursor: pointer; transition: 0.3s; border: 1.5px solid transparent;
}
.pill.active { border-color: var(--system-blue); background: rgba(10, 132, 255, 0.1); }
.pill .val { font-size: 18px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

textarea { 
    width: 100%; background: var(--system-tertiary-bg); border: none; 
    color: #fff; padding: 14px; border-radius: 14px; font-size: 15px;
    resize: none; outline: none; margin-bottom: 1rem; line-height: 1.5;
}

/* --- FEEDBACK LIST --- */
.cell-list { flex: 1; overflow-y: auto; padding: 0 1.5rem 1.5rem; display: flex; flex-direction: column; gap: 0.8rem; }
.fb-card { background: var(--system-tertiary-bg); border-radius: 18px; padding: 16px; position: relative; transition: 0.3s; }
.fb-card.done { opacity: 0.4; filter: saturate(0); }
.card-time { background: var(--system-blue); padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; display: inline-block; margin-bottom: 8px; }
.card-actions { position: absolute; top: 16px; right: 16px; display: flex; gap: 12px; opacity: 0; transition: 0.2s; }
.fb-card:hover .card-actions { opacity: 1; }

/* --- MISC --- */
.btn-round { width: 40px; height: 40px; border-radius: 50%; background: var(--system-tertiary-bg); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.btn-round:hover { transform: scale(1.1); background: var(--system-blue); }

.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 24px; border-radius: 100px; font-weight: 600; opacity: 0; transition: 0.4s; z-index: 3000; }
.toast.show { opacity: 1; top: 95px; }

@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    ANTIGRAVITY
  </div>
  
  <div class="url-section" id="urlSection">
    <input type="text" id="urlInput" class="url-input" placeholder="Dán link Video (YouTube/Drive/Vimeo)...">
    <button class="btn-round" onclick="loadVideo()" title="Nạp video">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 7l5 5-5 5M13 7l5 5-5 5"/></svg>
    </button>
  </div>

  <div class="more-container">
    <button class="btn-round" onclick="toggleMenu()" title="Menu chức năng">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    </button>
    <div class="dropdown-menu" id="mainMenu">
        <div class="menu-group">
            <div class="menu-label">Dữ liệu dự án</div>
            <div class="menu-item" onclick="exportJSON()">💾 Save Session (JSON)</div>
            <div class="menu-item" onclick="document.getElementById('importIn').click()">📂 Open Session</div>
            <div class="menu-item" onclick="exportPDF()">📄 Xuất PDF Report</div>
            <div class="menu-item" onclick="exportXLSX()">📊 Xuất Excel</div>
        </div>
        <div class="menu-group">
            <div class="menu-label">Phím tắt (Shortcuts)</div>
            <div class="menu-item">Play / Pause <span class="shortcut">Space</span></div>
            <div class="menu-item">Tới/Lùi 1s <span class="shortcut">← / →</span></div>
            <div class="menu-item">Tới/Lùi 5s <span class="shortcut">↑ / ↓</span></div>
            <div class="menu-item">Lưu Note <span class="shortcut">Ctrl+↵</span></div>
        </div>
    </div>
  </div>
  <input type="file" id="importIn" hidden accept=".json" onchange="importJSON(event)">
</header>

<main>
  <section class="workspace">
    <div class="v-viewport" id="vBox">
      <div id="yt-frame"></div><iframe id="drive-frame" style="display:none"></iframe><div id="vimeo-frame"></div><video id="dv" controls></video>
      <div id="v-msg" style="padding: 20%; text-align: center; color: var(--label-secondary);">Vui lòng nạp link để bắt đầu review.</div>
    </div>
    <div class="status-bar">
      <div class="tc-live" id="tcClock">00:00:00</div>
    </div>
  </section>

  <aside class="sidebar">
    <div class="sidebar-header">
      <h2 id="projTitle">Notebook</h2>
      <span id="progress-text" style="font-size: 11px; font-weight: 700; color: var(--system-blue);">0/0 DONE</span>
    </div>

    <div class="editor-area">
      <div class="pill-group">
        <div class="pill active" id="boxA" onclick="setSync('A')">
          <div class="val" id="valA">00:00:00</div>
        </div>
        <div class="pill" id="boxB" onclick="setSync('B')">
          <div class="val" id="valB">--:--:--</div>
          <span style="position:absolute; top:4px; right:8px; opacity:0.3; font-size:10px" onclick="clearB(event)">✕</span>
        </div>
      </div>

      <textarea id="noteText" placeholder="Nhập nhận xét của bạn..." rows="5" onfocus="setSync(null)"></textarea>
      
      <div style="display:flex; gap:10px;">
          <button class="btn-round" onclick="document.getElementById('fileIn').click()" style="width:100%; border-radius:14px; font-size:13px; font-weight:600; gap:8px;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
              Ảnh minh họa
          </button>
          <button class="btn-round" onclick="saveFb()" style="width:100%; border-radius:14px; background:var(--system-blue); font-size:13px; font-weight:600;">
              Lưu Cell
          </button>
      </div>
      <input type="file" id="fileIn" hidden onchange="handleFile(event)">
      <img id="pImg" style="max-width:100%; border-radius:12px; display:none; margin-top:15px; border:0.5px solid rgba(255,255,255,0.1)"/>
    </div>

    <div class="cell-list" id="fbList"></div>
  </aside>
</main>

<div class="toast" id="toast"></div>

<script>
let feedbacks = [], videoType = '', videoId = '', videoUrl = '', syncTarget = 'A', currentImg = null;
let ytPlayer = null, vimeoPlayer = null, vimeoTime = 0;

function toast(m){ 
    const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2000);
}

function toggleMenu() { document.getElementById('mainMenu').classList.toggle('show'); }

function fmt(s){
    s=Math.floor(s||0);
    return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(v=>String(v).padStart(2,'0')).join(':');
}

function setSync(t){
    syncTarget = t;
    document.getElementById('boxA').classList.toggle('active', t==='A');
    document.getElementById('boxB').classList.toggle('active', t==='B');
}

function clearB(e){
    if(e) e.stopPropagation();
    document.getElementById('valB').innerText = '--:--:--';
    setSync('A');
}

/* --- DRIVE LINK FIXER --- */
function fixDriveUrl(url) {
    const match = url.match(/\/file\/d\/([^\/]+)\//) || url.match(/[?&]id=([^&]+)/);
    if (match && match[1]) {
        return `https://drive.google.com/file/d/${match[1]}/preview`;
    }
    return url;
}

function getTime(){
    if(videoType === 'native') return document.getElementById('dv').currentTime;
    if(videoType === 'yt' && ytPlayer?.getCurrentTime) return ytPlayer.getCurrentTime();
    if(videoType === 'vimeo') return vimeoTime;
    return 0;
}

function setTime(sec){
    if(videoType === 'native') document.getElementById('dv').currentTime = sec;
    if(videoType === 'yt' && ytPlayer) ytPlayer.seekTo(sec, true);
    if(videoType === 'vimeo' && vimeoPlayer) vimeoPlayer.setCurrentTime(sec);
}

setInterval(() => {
    const now = getTime();
    document.getElementById('tcClock').innerText = fmt(now);
    if(syncTarget === 'A') document.getElementById('valA').innerText = fmt(now);
    if(syncTarget === 'B') document.getElementById('valB').innerText = fmt(now);
}, 200);

function loadVideo(){
    const urlInput = document.getElementById('urlInput').value.trim();
    if(!urlInput) return;
    videoUrl = urlInput;
    document.getElementById('urlSection').classList.add('active');
    
    document.getElementById('v-msg').style.display='none';
    document.getElementById('dv').style.display='none';
    document.getElementById('yt-frame').style.display='none';
    document.getElementById('drive-frame').style.display='none';
    document.getElementById('vimeo-frame').style.display='none';

    if(urlInput.includes('youtube.com') || urlInput.includes('youtu.be')){
        videoType = 'yt';
        videoId = urlInput.includes('v=') ? urlInput.split('v=')[1].split('&')[0] : urlInput.split('/').pop();
        document.getElementById('yt-frame').style.display='block';
        document.getElementById('yt-frame').innerHTML = '<div id="player"></div>';
        ytPlayer = new YT.Player('player', { height: '100%', width: '100%', videoId: videoId, playerVars: { 'origin': window.location.origin },
            events: { 'onReady': (e) => { document.getElementById('projTitle').innerText = e.target.getVideoData().title; autoLoad(); }}
        });
    } else if(urlInput.includes('drive.google.com')) {
        videoType = 'drive';
        document.getElementById('drive-frame').style.display='block';
        document.getElementById('drive-frame').src = fixDriveUrl(urlInput);
        document.getElementById('projTitle').innerText = "Google Drive Video";
        autoLoad();
    } else if(urlInput.includes('vimeo')) {
        videoType = 'vimeo';
        const id = urlInput.split('/').pop();
        document.getElementById('vimeo-frame').style.display='block';
        document.getElementById('vimeo-frame').innerHTML = `<iframe id="v-frame" src="https://player.vimeo.com/video/${id}?api=1" width="100%" height="100%" frameborder="0"></iframe>`;
        vimeoPlayer = new Vimeo.Player(document.getElementById('v-frame'));
        vimeoPlayer.on('timeupdate', (data) => { vimeoTime = data.seconds; });
        vimeoPlayer.getVideoTitle().then(t => { document.getElementById('projTitle').innerText = t; autoLoad(); });
    } else {
        videoType = 'native';
        const v = document.getElementById('dv'); v.style.display='block'; v.src = urlInput;
        document.getElementById('projTitle').innerText = "Local Video Source";
        autoLoad();
    }
}

function autoLoad(){
    const saved = localStorage.getItem('ag_ios_v5_' + videoUrl);
    feedbacks = saved ? JSON.parse(saved).feedbacks : [];
    render();
}

function saveFb(){
    const note = document.getElementById('noteText').value.trim();
    if(!note && !currentImg) return;
    let tA = document.getElementById('valA').innerText, tB = document.getElementById('valB').innerText;
    const secA = tA.split(':').reduce((acc, t) => (60 * acc) + +t, 0);
    const secB = tB === '--:--:--' ? null : tB.split(':').reduce((acc, t) => (60 * acc) + +t, 0);
    if(secB !== null && secB < secA) [tA, tB] = [tB, tA];

    feedbacks.push({ id: Date.now(), tc: (tB === '--:--:--') ? tA : `${tA} - ${tB}`, sec: secA, note, img: currentImg, done: false });
    render(); resetEditor();
    localStorage.setItem('ag_ios_v5_' + videoUrl, JSON.stringify({ feedbacks }));
    toast("✓ Cell Recorded");
}

function resetEditor(){
    document.getElementById('noteText').value = ''; document.getElementById('valB').innerText = '--:--:--';
    document.getElementById('pImg').style.display = 'none'; currentImg = null; setSync('A');
}

function toggleDone(id){
    const fb = feedbacks.find(f => f.id === id); if(fb) fb.done = !fb.done;
    render(); localStorage.setItem('ag_ios_v5_' + videoUrl, JSON.stringify({ feedbacks }));
}

function render(){
    const list = document.getElementById('fbList');
    const doneCount = feedbacks.filter(f => f.done).length;
    document.getElementById('progress-text').innerText = `${doneCount}/${feedbacks.length} DONE`;
    list.innerHTML = feedbacks.sort((a,b)=>a.sec - b.sec).map(f => `
        <div class="fb-card ${f.done ? 'done' : ''}">
            <div class="card-time" onclick="setTime(${f.sec})">${f.tc}</div>
            <div class="card-actions">
                <div class="icon-btn" onclick="toggleDone(${f.id})" style="color:var(--system-green)">●</div>
                <div class="icon-btn" onclick="delFb(${f.id})" style="color:var(--system-red)">✕</div>
            </div>
            <div style="font-size: 14px; white-space: pre-wrap;">${f.note}</div>
            ${f.img ? `<img src="${f.img}" style="max-width:100%; margin-top:10px; border-radius:12px; border:0.5px solid rgba(255,255,255,0.1)">` : ''}
        </div>`).join('');
}

function delFb(id){ feedbacks = feedbacks.filter(f => f.id !== id); render(); localStorage.setItem('ag_ios_v5_' + videoUrl, JSON.stringify({ feedbacks })); }

/* --- EXPORTS --- */
function exportJSON(){
    const blob = new Blob([JSON.stringify({ feedbacks })], {type: 'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `Project_${Date.now()}.json`; a.click();
}

function importJSON(e){
    const reader = new FileReader();
    reader.onload = (ex) => { feedbacks = JSON.parse(ex.target.result).feedbacks || []; render(); };
    reader.readAsText(e.target.files[0]);
}

function exportXLSX(){
    const ws = XLSX.utils.json_to_sheet(feedbacks.map(f => ({ Time: f.tc, Note: f.note, Status: f.done ? "Fixed" : "Pending" })));
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Feedback");
    XLSX.writeFile(wb, "Feedback.xlsx");
}

function exportPDF(){
    const body = feedbacks.sort((a,b)=>a.sec-b.sec).map(f => `<div style="margin-bottom:20px; border-bottom:1px solid #ddd; padding-bottom:10px"><p><b>[${f.tc}]</b></p><p>${f.note}</p></div>`).join('');
    const el = document.createElement('div'); el.innerHTML = `<h1>${document.getElementById('projTitle').innerText}</h1>${body}`;
    html2pdf().from(el).set({ margin: 10, filename: 'Report.pdf' }).save();
}

/* --- SHORTCUTS --- */
document.addEventListener('keydown', (e) => {
    const typing = document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT';
    if(e.key === 'Enter' && e.ctrlKey) saveFb();
    if(!typing) {
        if(e.code === 'Space') { 
            e.preventDefault(); 
            if(videoType==='native') document.getElementById('dv').paused ? document.getElementById('dv').play() : document.getElementById('dv').pause(); 
            if(videoType==='yt') ytPlayer.getPlayerState()===1 ? ytPlayer.pauseVideo() : ytPlayer.playVideo(); 
        }
        if(e.key === 'ArrowLeft') { e.preventDefault(); setTime(getTime() - 1); }
        if(e.key === 'ArrowRight') { e.preventDefault(); setTime(getTime() + 1); }
        if(e.key === 'ArrowUp') { e.preventDefault(); setTime(getTime() + 5); }
        if(e.key === 'ArrowDown') { e.preventDefault(); setTime(getTime() - 5); }
        if(e.key === 'Delete' || e.key === 'Backspace') clearB();
    }
});

document.addEventListener('paste', (e) => {
    const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
    if(item){
        const reader = new FileReader();
        reader.onload = (ex) => { currentImg = ex.target.result; document.getElementById('pImg').src = currentImg; document.getElementById('pImg').style.display='block'; setSync(null); };
        reader.readAsDataURL(item.getAsFile());
    }
});

function handleFile(e){
    const reader = new FileReader();
    reader.onload = (ex) => { currentImg = ex.target.result; document.getElementById('pImg').src = currentImg; document.getElementById('pImg').style.display='block'; setSync(null); };
    reader.readAsDataURL(e.target.files[0]);
}

window.onclick = function(event) { if (!event.target.closest('.more-container')) { document.getElementById('mainMenu').classList.remove('show'); } }

var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0]; firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
</script>
</body>
</html>
