<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Antigravity Feedback - Pure Edition</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>

<script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://player.vimeo.com/api/player.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
  --bg-deep: #050505;
  --accent-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
  --accent-solid: #8b5cf6;
  --glass: rgba(255, 255, 255, 0.03);
  --border: rgba(255, 255, 255, 0.1);
  --text-sec: #a1a1aa;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg-deep); color: #fff; line-height: 1.5; overflow-x: hidden; }

.app { max-width: 1600px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: 1fr 420px; gap: 2rem; }
@media(max-width: 1100px) { .app { grid-template-columns: 1fr; } }

.bento { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; }

.v-container { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; border-radius: 24px; overflow: hidden; }
#yt-frame, video#dv { width: 100%; height: 100%; position: absolute; top:0; left:0; display: none; }

.tc-bar { margin-top: 1rem; padding: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
.tc-clock { font-size: 40px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -2px; }

.panel { display: flex; flex-direction: column; gap: 1.5rem; }
input, textarea { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 12px; outline: none; transition: 0.2s; }
input:focus, textarea:focus { border-color: var(--accent-solid); }

.time-row { display: flex; gap: 10px; margin-bottom: 12px; }
.tc-box { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 12px; text-align: center; cursor: pointer; position: relative; }
.tc-box.active { border-color: var(--accent-solid); background: rgba(139, 92, 246, 0.1); }
.tc-label { display: block; font-size: 10px; font-weight: 800; color: var(--text-sec); margin-bottom: 4px; text-transform: uppercase; }
.tc-val { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; }
.btn-clear-b { position: absolute; top: 8px; right: 8px; font-size: 10px; opacity: 0.5; cursor: pointer; }

.upload-zone { margin-top: 10px; border: 1px dashed var(--border); border-radius: 12px; min-height: 50px; text-align: center; padding: 10px; cursor: pointer; }
.upload-zone img { max-width: 100%; border-radius: 8px; display: none; margin: 10px auto; }

.btn { padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-primary { background: var(--accent-grad); color: #fff; width: 100%; }

.fb-list { overflow-y: auto; max-height: 500px; padding-right: 5px; }
.fb-item { padding: 1.5rem; border-bottom: 1px solid var(--border); position: relative; }
.fb-tc { display: inline-block; padding: 4px 12px; background: var(--accent-solid); border-radius: 100px; font-size: 12px; font-weight: 800; margin-bottom: 10px; cursor: pointer; }

.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #18181b; padding: 12px 24px; border-radius: 100px; border: 1px solid #3f3f46; opacity: 0; transition: 0.3s; z-index: 10000; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="app">
  <div class="video-main">
    <div class="v-container bento">
        <div id="v-msg" style="padding: 20%; text-align: center; color: var(--text-sec)">Dán link Video & Load</div>
        <div id="yt-frame"></div><video id="dv" controls></video>
    </div>
    <div class="tc-bar bento">
      <div class="tc-clock" id="tcClock">00:00:00</div>
      <div style="text-align: right">
          <div style="color: var(--accent-solid); font-weight: 800; font-size: 11px;">SYNC LIVE</div>
          <div style="color: var(--text-sec); font-size: 13px;">Arrows: Control | Space: Toggle</div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="bento" style="padding: 1.5rem; display: flex; flex-direction: column; gap: 10px;">
        <div style="display: flex; gap: 8px;">
            <input type="text" id="urlInput" placeholder="Dán link YouTube/Drive...">
            <button class="btn" style="background: #333; padding: 0 20px;" onclick="loadVideo()">Load</button>
        </div>
        <input type="text" id="reportName" placeholder="Tên báo cáo..." style="font-weight:700">
    </div>

    <div class="fb-editor bento">
      <div style="padding: 1.5rem;">
        <div class="time-row">
          <div class="tc-box active" id="boxA" onclick="setSync('A')">
            <span class="tc-label">Từ (A)</span>
            <div class="tc-val" id="valA">00:00:00</div>
          </div>
          <div class="tc-box" id="boxB" onclick="setSync('B')">
            <span class="tc-label">Đến (B)</span>
            <div class="tc-val" id="valB">--:--:--</div>
            <span class="btn-clear-b" onclick="clearB(event)">✕</span>
          </div>
        </div>
        <textarea id="noteText" placeholder="Nhận xét..." rows="4" onfocus="setSync(null)"></textarea>
        <div class="upload-zone" onclick="document.getElementById('fileIn').click()">
            <span id="hint" style="font-size: 11px; opacity: 0.5;">Dán ảnh (Ctrl+V) hoặc click Up ảnh</span>
            <img id="pImg"/>
        </div>
        <input type="file" id="fileIn" hidden onchange="handleFile(event)">
        <button class="btn btn-primary" style="margin-top:1rem" onclick="saveFb()">Lưu Feedback (Ctrl + Enter)</button>
      </div>
      <div class="fb-list" id="fbList"></div>
    </div>
    <button class="btn" style="background: var(--glass)" onclick="exportPDF()">Export PDF Report</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let feedbacks = [], videoType = '', videoId = '', videoUrl = '', syncTarget = 'A', currentImg = null, ytPlayer = null;

function toast(m){ 
    const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2000);
}

function fmt(s){
    s=Math.floor(s||0);
    return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(v=>String(v).padStart(2,'0')).join(':');
}

function setSync(t){
    syncTarget = t;
    document.getElementById('boxA').classList.toggle('active', t==='A');
    document.getElementById('boxB').classList.toggle('active', t==='B');
}

function clearB(e){
    if(e) e.stopPropagation();
    document.getElementById('valB').innerText = '--:--:--';
    setSync('A');
}

function getTime(){
    if(videoType === 'native') return document.getElementById('dv').currentTime;
    if(videoType === 'yt' && ytPlayer?.getCurrentTime) return ytPlayer.getCurrentTime();
    return 0;
}

function setTime(sec){
    if(videoType === 'native') document.getElementById('dv').currentTime = sec;
    if(videoType === 'yt' && ytPlayer) ytPlayer.seekTo(sec, true);
}

// Global Sync
setInterval(() => {
    const now = getTime();
    document.getElementById('tcClock').innerText = fmt(now);
    if(syncTarget === 'A') document.getElementById('valA').innerText = fmt(now);
    if(syncTarget === 'B') document.getElementById('valB').innerText = fmt(now);
}, 200);

function loadVideo(){
    const url = document.getElementById('urlInput').value.trim();
    if(!url) return;
    videoUrl = url;
    document.getElementById('v-msg').style.display='none';
    document.getElementById('dv').style.display='none';
    document.getElementById('yt-frame').style.display='none';
    
    if(url.includes('youtube.com') || url.includes('youtu.be')){
        videoType = 'yt';
        videoId = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
        document.getElementById('yt-frame').style.display='block';
        document.getElementById('yt-frame').innerHTML = '<div id="player"></div>';
        ytPlayer = new YT.Player('player', { height: '100%', width: '100%', videoId: videoId, events: {
            'onReady': (e) => { document.getElementById('reportName').value = e.target.getVideoData().title; }
        }});
    } else {
        videoType = 'native';
        const v = document.getElementById('dv'); v.style.display='block'; v.src = url;
        document.getElementById('reportName').value = "Video Local Report";
    }
    // Auto-load from local storage
    const saved = localStorage.getItem('antigravity_' + url);
    if(saved) { feedbacks = JSON.parse(saved); render(); toast("🔄 Đã nạp lại session cũ"); }
}

function saveFb(){
    const note = document.getElementById('noteText').value.trim();
    if(!note && !currentImg) return;
    let tA = document.getElementById('valA').innerText, tB = document.getElementById('valB').innerText;
    const secA = tA.split(':').reduce((acc, t) => (60 * acc) + +t, 0);
    const secB = tB === '--:--:--' ? null : tB.split(':').reduce((acc, t) => (60 * acc) + +t, 0);
    if(secB !== null && secB < secA) [tA, tB] = [tB, tA];

    feedbacks.push({ id: Date.now(), tc: (tB === '--:--:--') ? tA : `${tA} - ${tB}`, sec: secA, note, img: currentImg });
    render(); resetEditor();
    localStorage.setItem('antigravity_' + videoUrl, JSON.stringify(feedbacks));
    toast("💾 Auto-saved");
}

function resetEditor(){
    document.getElementById('noteText').value = '';
    document.getElementById('valB').innerText = '--:--:--';
    document.getElementById('pImg').style.display = 'none';
    document.getElementById('hint').style.display = 'block';
    currentImg = null; setSync('A');
}

function render(){
    document.getElementById('fbList').innerHTML = feedbacks.sort((a,b)=>a.sec - b.sec).map(f => `
        <div class="fb-item">
            <div class="fb-tc" onclick="setTime(${f.sec})">▶ ${f.tc}</div>
            <div style="font-size:14px">${f.note}</div>
            ${f.img ? `<img src="${f.img}" style="max-width:100%; margin-top:10px; border-radius:8px">` : ''}
            <div style="position:absolute; top:1.5rem; right:1rem; opacity:0.1; cursor:pointer" onclick="delFb(${f.id})">✕</div>
        </div>`).join('');
}

function delFb(id){ 
    feedbacks = feedbacks.filter(f => f.id !== id); 
    render(); 
    localStorage.setItem('antigravity_' + videoUrl, JSON.stringify(feedbacks));
}

// --- SHORTCUTS LOGIC ---
document.addEventListener('keydown', (e) => {
    const typing = document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT';
    
    if(e.key === 'Enter' && e.ctrlKey) saveFb();

    if(!typing) {
        if(e.code === 'Space') { 
            e.preventDefault();
            if(videoType==='native') { const v=document.getElementById('dv'); v.paused ? v.play() : v.pause(); }
            if(videoType==='yt' && ytPlayer) { ytPlayer.getPlayerState()===1 ? ytPlayer.pauseVideo() : ytPlayer.playVideo(); }
        }
        if(e.key === 'ArrowLeft') { e.preventDefault(); setTime(getTime() - 0.05); } // Frame lùi
        if(e.key === 'ArrowRight') { e.preventDefault(); setTime(getTime() + 0.05); } // Frame tới
        if(e.key === 'ArrowUp') { e.preventDefault(); setTime(getTime() + 5); } // 5s tới
        if(e.key === 'ArrowDown') { e.preventDefault(); setTime(getTime() - 5); } // 5s lùi
        if(e.key === 'Delete' || e.key === 'Backspace') clearB();
    }
});

document.addEventListener('paste', (e) => {
    const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
    if(item){
        const reader = new FileReader();
        reader.onload = (ex) => { currentImg = ex.target.result; document.getElementById('pImg').src = currentImg; document.getElementById('pImg').style.display='block'; document.getElementById('hint').style.display='none'; setSync(null); };
        reader.readAsDataURL(item.getAsFile());
    }
});

function handleFile(e){
    const reader = new FileReader();
    reader.onload = (ex) => { currentImg = ex.target.result; document.getElementById('pImg').src = currentImg; document.getElementById('pImg').style.display='block'; document.getElementById('hint').style.display='none'; setSync(null); };
    reader.readAsDataURL(e.target.files[0]);
}

var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0]; firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
</script>
</body>
</html>
