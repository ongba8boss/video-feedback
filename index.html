<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Antigravity | Collaboration Notebook</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
<script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://player.vimeo.com/api/player.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
  --system-bg: #000000;
  --system-secondary-bg: #1C1C1E;
  --system-tertiary-bg: #2C2C2E;
  --system-blue: #0A84FF;
  --system-green: #30D158;
  --label-primary: #FFFFFF;
  --label-secondary: #8E8E93;
  --glass: rgba(28, 28, 30, 0.85);
  --border-subtle: rgba(255,255,255,0.1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  font-family: 'Inter', -apple-system, sans-serif; 
  background-color: var(--system-bg); color: var(--label-primary); 
  height: 100vh; overflow: hidden; display: flex; flex-direction: column;
}

/* --- HEADER --- */
header {
  height: 64px; backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
  background: var(--glass); border-bottom: 0.5px solid var(--border-subtle);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.5rem; z-index: 2000;
}
.logo { font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; letter-spacing: 1px; }

.url-section { display: flex; align-items: center; gap: 10px; transition: 0.3s; flex: 1; justify-content: center; }
.url-input { 
    background: var(--system-tertiary-bg); border: none; color: #fff; 
    padding: 8px 16px; border-radius: 10px; width: 300px; font-size: 13px; outline: none; transition: 0.3s;
}
.url-section.active .url-input { width: 60px; opacity: 0.2; }

.header-actions { display: flex; gap: 8px; }

/* --- BUTTONS --- */
.btn-round { 
    width: 38px; height: 38px; border-radius: 50%; background: var(--system-tertiary-bg); 
    border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; 
}
.btn-round:hover { transform: scale(1.05); background: var(--system-blue); }
.btn-export-main {
    background: var(--system-blue); border-radius: 10px; padding: 0 16px; height: 38px;
    color: #fff; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; border: none; cursor: pointer; transition: 0.2s;
}
.btn-export-main:hover { filter: brightness(1.1); }

/* --- DROPDOWN MENU --- */
.dropdown { position: relative; }
.dropdown-content {
    position: absolute; right: 0; top: 45px; background: rgba(44, 44, 46, 0.98);
    backdrop-filter: blur(30px); border-radius: 14px; width: 220px;
    padding: 8px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    display: none; z-index: 2100; border: 0.5px solid var(--border-subtle);
}
.dropdown-content.show { display: block; }
.menu-item {
    padding: 10px 12px; font-size: 14px; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between; transition: 0.15s;
}
.menu-item:hover { background: var(--system-blue); color: #fff; }
.menu-item span.shortcut { font-size: 10px; opacity: 0.5; font-family: 'JetBrains Mono', monospace; }

/* --- MAIN LAYOUT --- */
main { display: flex; flex: 1; overflow: hidden; }
.workspace { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.2rem; }
.v-viewport { 
    background: #000; border-radius: 20px; overflow: hidden; aspect-ratio: 16/9; 
    position: relative; box-shadow: 0 40px 80px rgba(0,0,0,0.7); 
}
#yt-frame, #drive-frame, video#dv { width: 100%; height: 100%; position: absolute; border: none; }

.tc-big { font-family: 'JetBrains Mono', monospace; font-size: 3.5rem; font-weight: 600; letter-spacing: -4px; text-align: center; color: var(--label-primary); }

/* --- SIDEBAR --- */
.sidebar { width: 440px; background: var(--system-secondary-bg); border-left: 0.5px solid var(--border-subtle); display: flex; flex-direction: column; }
.editor-area { padding: 1.5rem; border-bottom: 0.5px solid var(--border-subtle); }

.pill-group { display: flex; gap: 8px; margin-bottom: 1rem; }
.pill { 
    flex: 1; background: var(--system-tertiary-bg); padding: 10px; border-radius: 12px; 
    text-align: center; cursor: pointer; border: 1.5px solid transparent; transition: 0.2s;
}
.pill.active { border-color: var(--system-blue); background: rgba(10, 132, 255, 0.1); }
.pill .val { font-size: 17px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

textarea { 
    width: 100%; background: var(--system-tertiary-bg); border: none; 
    color: #fff; padding: 12px; border-radius: 12px; font-size: 14px;
    resize: none; outline: none; margin-bottom: 8px; line-height: 1.5; font-family: inherit;
}
.link-box { font-size: 12px; opacity: 0.7; color: var(--system-blue); }

.img-preview { 
    background: rgba(255,255,255,0.03); border-radius: 12px; padding: 10px; 
    text-align: center; cursor: pointer; margin-bottom: 12px; font-size: 11px; color: var(--label-secondary);
}
.img-preview img { max-width: 100%; border-radius: 8px; display: none; margin-top: 8px; }

/* --- LIST --- */
.cell-list { flex: 1; overflow-y: auto; padding: 1.2rem; display: flex; flex-direction: column; gap: 0.8rem; }
.fb-card { background: var(--system-tertiary-bg); border-radius: 16px; padding: 14px; position: relative; }
.fb-card.done { opacity: 0.3; filter: saturate(0.2); }
.fb-badge { background: var(--system-blue); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; display: inline-block; margin-bottom: 8px; }
.fb-links { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
.link-pill { font-size: 10px; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 4px; color: var(--label-secondary); text-decoration: none; }

.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 10px 24px; border-radius: 100px; font-weight: 600; opacity: 0; transition: 0.3s; z-index: 3000; }
.toast.show { opacity: 1; top: 40px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    ANTIGRAVITY
  </div>
  
  <div class="url-section" id="urlSection">
    <input type="text" id="urlInput" class="url-input" placeholder="Dán link Video...">
    <button class="btn-round" onclick="loadVideo()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 4v7a3 3 0 0 1-3 3H4M4 14l-4-4 4-4"/></svg>
    </button>
  </div>

  <div class="header-actions">
    <button class="btn-export-main" onclick="toggleMenu('exportMenu')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Export
    </button>
    
    <div class="dropdown">
        <button class="btn-round" onclick="toggleMenu('moreMenu')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
        </button>
        <div class="dropdown-content" id="moreMenu">
            <div class="menu-item" onclick="exportJSON()">💾 Save Session (JSON)</div>
            <div class="menu-item" onclick="document.getElementById('importIn').click()">📂 Open Session</div>
            <div class="menu-item" style="border-top:0.5px solid var(--border-subtle); color:var(--label-secondary); pointer-events:none;">SHORCUTS:</div>
            <div class="menu-item">Tới/Lùi 1s <span class="shortcut">← / →</span></div>
            <div class="menu-item">Tới/Lùi 5s <span class="shortcut">↑ / ↓</span></div>
            <div class="menu-item">Play/Pause <span class="shortcut">Space</span></div>
            <div class="menu-item">Lưu Cell <span class="shortcut">Ctrl+↵</span></div>
        </div>
        <div class="dropdown-content" id="exportMenu" style="right: auto; left: -100px;">
            <div class="menu-item" onclick="exportPDF()">📄 Export PDF Report</div>
            <div class="menu-item" onclick="exportXLSX()">📊 Export Excel (.xlsx)</div>
        </div>
    </div>
  </div>
  <input type="file" id="importIn" hidden accept=".json" onchange="importJSON(event)">
</header>

<main>
  <section class="workspace">
    <div class="v-viewport" id="vBox">
      <div id="yt-frame"></div><iframe id="drive-frame" style="display:none"></iframe><video id="dv" controls></video>
      <div id="v-msg" style="padding: 20%; text-align: center; color: var(--label-secondary);">Vui lòng nạp link video.</div>
    </div>
    <div class="tc-big" id="tcClock">00:00:00</div>
  </section>

  <aside class="sidebar">
    <div class="sidebar-header">
      <h2 id="projTitle">Notebook</h2>
      <span id="progress-text" style="font-size: 11px; font-weight: 700; color: var(--system-blue);">0/0 DONE</span>
    </div>

    <div class="editor-area">
      <div class="pill-group">
        <div class="pill active" id="boxA" onclick="setSync('A')"><div class="val" id="valA">00:00:00</div></div>
        <div class="pill" id="boxB" onclick="setSync('B')"><div class="val" id="valB">--:--:--</div></div>
      </div>

      <textarea id="noteText" placeholder="Nhập nhận xét của bạn..." rows="3" onfocus="setSync(null)"></textarea>
      
      <textarea id="refLinks" class="link-box" placeholder="Dán các link tham chiếu (Figma, Notion, Drive...)" rows="2"></textarea>
      
      <div style="display:flex; gap:8px;">
          <button class="btn-round" onclick="document.getElementById('fileIn').click()" style="width:auto; border-radius:12px; flex:1; font-size:12px;">🖼️ Ảnh</button>
          <button class="btn-round" onclick="saveFb()" style="width:auto; border-radius:12px; flex:2; background:var(--system-blue); font-size:13px; font-weight:700;">Lưu Cell</button>
      </div>
      <input type="file" id="fileIn" hidden onchange="handleFile(event)">
      <img id="pImg" style="max-width:100%; border-radius:10px; display:none; margin-top:10px; border:0.5px solid var(--border-subtle)"/>
    </div>

    <div class="cell-list" id="fbList"></div>
  </aside>
</main>

<div class="toast" id="toast"></div>

<script>
let feedbacks = [], videoType = '', videoId = '', videoUrl = '', syncTarget = 'A', currentImg = null, ytPlayer = null;

function toast(m){ 
    const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2000);
}

function fmt(s){
    s=Math.floor(s||0);
    return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(v=>String(v).padStart(2,'0')).join(':');
}

function toggleMenu(id) { 
    document.querySelectorAll('.dropdown-content').forEach(el => { if(el.id !== id) el.classList.remove('show'); });
    document.getElementById(id).classList.toggle('show'); 
}

function setSync(t){
    syncTarget = t;
    document.getElementById('boxA').classList.toggle('active', t==='A');
    document.getElementById('boxB').classList.toggle('active', t==='B');
}

/* --- DRIVE LINK FIX --- */
function fixDriveUrl(url) {
    const match = url.match(/\/file\/d\/([^\/]+)\//) || url.match(/[?&]id=([^&]+)/);
    return match ? `https://drive.google.com/file/d/${match[1]}/preview` : url;
}

function getTime(){
    if(videoType === 'native') return document.getElementById('dv').currentTime;
    if(videoType === 'yt' && ytPlayer?.getCurrentTime) return ytPlayer.getCurrentTime();
    return 0;
}

function setTime(sec){
    if(videoType === 'native') document.getElementById('dv').currentTime = sec;
    if(videoType === 'yt' && ytPlayer) ytPlayer.seekTo(sec, true);
}

setInterval(() => {
    const now = getTime();
    document.getElementById('tcClock').innerText = fmt(now);
    if(syncTarget === 'A') document.getElementById('valA').innerText = fmt(now);
    if(syncTarget === 'B') document.getElementById('valB').innerText = fmt(now);
}, 200);

function loadVideo(){
    const url = document.getElementById('urlInput').value.trim();
    if(!url) return;
    videoUrl = url;
    document.getElementById('urlSection').classList.add('active');
    document.getElementById('v-msg').style.display='none';
    document.getElementById('dv').style.display='none';
    document.getElementById('yt-frame').style.display='none';
    document.getElementById('drive-frame').style.display='none';

    if(url.includes('youtube.com') || url.includes('youtu.be')){
        videoType = 'yt';
        const id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
        document.getElementById('yt-frame').style.display='block';
        document.getElementById('yt-frame').innerHTML = '<div id="player"></div>';
        ytPlayer = new YT.Player('player', { height: '100%', width: '100%', videoId: id, events: {
            'onReady': (e) => { document.getElementById('projTitle').innerText = e.target.getVideoData().title; autoLoad(); }
        }});
    } else if(url.includes('drive.google.com')) {
        videoType = 'drive';
        document.getElementById('drive-frame').style.display='block';
        document.getElementById('drive-frame').src = fixDriveUrl(url);
        document.getElementById('projTitle').innerText = "Google Drive Video";
        autoLoad();
    } else {
        videoType = 'native';
        const v = document.getElementById('dv'); v.style.display='block'; v.src = url;
        document.getElementById('projTitle').innerText = "Local Video Source";
        autoLoad();
    }
}

function autoLoad(){
    const saved = localStorage.getItem('ag_ios_v7_' + videoUrl);
    feedbacks = saved ? JSON.parse(saved).feedbacks : [];
    render();
}

function saveFb(){
    const note = document.getElementById('noteText').value.trim();
    const rawLinks = document.getElementById('refLinks').value.trim();
    if(!note && !currentImg) return;
    
    let tA = document.getElementById('valA').innerText, tB = document.getElementById('valB').innerText;
    const secA = tA.split(':').reduce((acc, t) => (60 * acc) + +t, 0);
    const secB = tB === '--:--:--' ? null : tB.split(':').reduce((acc, t) => (60 * acc) + +t, 0);
    if(secB !== null && secB < secA) [tA, tB] = [tB, tA];

    // Regex lọc nhiều links cùng lúc
    const links = rawLinks.match(/\bhttps?:\/\/\S+/gi) || [];

    feedbacks.push({ id: Date.now(), tc: (tB === '--:--:--') ? tA : `${tA} - ${tB}`, sec: secA, note, img: currentImg, links, done: false });
    render(); resetEditor();
    localStorage.setItem('ag_ios_v7_' + videoUrl, JSON.stringify({ feedbacks }));
    toast("✓ Cell Saved");
}

function resetEditor(){
    document.getElementById('noteText').value = ''; document.getElementById('refLinks').value = '';
    document.getElementById('valB').innerText = '--:--:--'; document.getElementById('pImg').style.display = 'none';
    currentImg = null; setSync('A');
}

function render(){
    const list = document.getElementById('fbList');
    const doneCount = feedbacks.filter(f => f.done).length;
    document.getElementById('progress-text').innerText = `${doneCount}/${feedbacks.length} DONE`;
    list.innerHTML = feedbacks.sort((a,b)=>a.sec - b.sec).map(f => `
        <div class="fb-card ${f.done ? 'done' : ''}">
            <div class="fb-badge" onclick="setTime(${f.sec})">${f.tc}</div>
            <div style="font-size: 14px; white-space: pre-wrap;">${f.note}</div>
            ${f.img ? `<img src="${f.img}" style="max-width:100%; margin-top:10px; border-radius:12px; border:0.5px solid var(--border-subtle)">` : ''}
            <div class="fb-links">
                ${f.links ? f.links.map(l => `<a href="${l}" target="_blank" class="link-pill">🔗 ${l.split('/')[2]}</a>`).join('') : ''}
            </div>
            <div style="position:absolute; top:12px; right:12px; display:flex; gap:10px;">
                <div onclick="toggleDone(${f.id})" style="color:var(--system-green); cursor:pointer;">●</div>
                <div onclick="delFb(${f.id})" style="color:var(--system-red); cursor:pointer;">✕</div>
            </div>
        </div>`).join('');
}

function toggleDone(id){ const f = feedbacks.find(x => x.id === id); f.done = !f.done; render(); localStorage.setItem('ag_ios_v7_' + videoUrl, JSON.stringify({ feedbacks })); }
function delFb(id){ feedbacks = feedbacks.filter(f => f.id !== id); render(); localStorage.setItem('ag_ios_v7_' + videoUrl, JSON.stringify({ feedbacks })); }

/* --- EXPORTS --- */
function exportJSON(){
    const blob = new Blob([JSON.stringify({ feedbacks })], {type: 'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `Project_${Date.now()}.json`; a.click();
}

function importJSON(e){
    const reader = new FileReader();
    reader.onload = (ex) => { feedbacks = JSON.parse(ex.target.result).feedbacks || []; render(); };
    reader.readAsText(e.target.files[0]);
}

function exportXLSX(){
    const ws = XLSX.utils.json_to_sheet(feedbacks.map(f => ({ Time: f.tc, Note: f.note, Links: (f.links || []).join(', ') })));
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Feedback");
    XLSX.writeFile(wb, "Feedback.xlsx");
}

function exportPDF(){
    const body = feedbacks.sort((a,b)=>a.sec-b.sec).map(f => `<div style="margin-bottom:20px; border-bottom:1px solid #ddd; padding-bottom:10px"><p><b>[${f.tc}]</b></p><p>${f.note}</p></div>`).join('');
    const el = document.createElement('div'); el.innerHTML = `<h1>${document.getElementById('projTitle').innerText}</h1>${body}`;
    html2pdf().from(el).set({ margin: 10, filename: 'Report.pdf' }).save();
}

/* --- SHORTCUTS --- */
document.addEventListener('keydown', (e) => {
    const typing = document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'INPUT';
    if(!typing) {
        if(e.code === 'Space') { e.preventDefault(); if(videoType==='native') document.getElementById('dv').paused ? document.getElementById('dv').play() : document.getElementById('dv').pause(); if(videoType==='yt') ytPlayer.getPlayerState()===1 ? ytPlayer.pauseVideo() : ytPlayer.playVideo(); }
        if(e.key === 'ArrowLeft') { e.preventDefault(); setTime(getTime() - 1); }
        if(e.key === 'ArrowRight') { e.preventDefault(); setTime(getTime() + 1); }
        if(e.key === 'ArrowUp') { e.preventDefault(); setTime(getTime() + 5); }
        if(e.key === 'ArrowDown') { e.preventDefault(); setTime(getTime() - 5); }
        if(e.key === 'Delete' || e.key === 'Backspace') { document.getElementById('valB').innerText = '--:--:--'; setSync('A'); }
    }
});

document.addEventListener('paste', (e) => {
    const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
    if(item){
        const reader = new FileReader();
        reader.onload = (ex) => { currentImg = ex.target.result; document.getElementById('pImg').src = currentImg; document.getElementById('pImg').style.display='block'; setSync(null); };
        reader.readAsDataURL(item.getAsFile());
    }
});

function handleFile(e){
    const reader = new FileReader();
    reader.onload = (ex) => { currentImg = ex.target.result; document.getElementById('pImg').src = currentImg; document.getElementById('pImg').style.display='block'; setSync(null); };
    reader.readAsDataURL(e.target.files[0]);
}

window.onclick = function(event) { if (!event.target.closest('.dropdown') && !event.target.closest('.btn-export-main')) { document.querySelectorAll('.dropdown-content').forEach(el => el.classList.remove('show')); } }

var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0]; firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
</script>
</body>
</html>
