<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Antigravity — MinXLabs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://player.vimeo.com/api/player.js"></script>
<style>
:root {
  --bg: #080809; --surface: #0f0f12; --panel: #141418; --card: #1a1a20;
  --line: rgba(255,255,255,0.06); --line2: rgba(255,255,255,0.10);
  --accent: #4f7fff; --accent-d: rgba(79,127,255,0.10);
  --green: #34d399; --red: #f87171; --ink: #e8e8f0; --ink2: #9090a8; --ink3: #50505f;
  --mono: 'Geist Mono', monospace; --sans: 'Sora', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--ink); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* ── HEADER ── */
header {
  height: 56px; background: var(--surface); border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between; padding: 0 20px; gap: 20px; flex-shrink: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.logo-mark { width: 26px; height: 26px; border: 1.5px solid var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--accent); }
.logo-text { font-family: var(--mono); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }

.header-center { flex: 0 1 640px; display: flex; flex-direction: column; gap: 4px; }
.report-row { display: flex; align-items: center; gap: 7px; }
#reportName { font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--ink); background: none; border: none; outline: none; flex: 1; }
.url-row { display: flex; align-items: center; gap: 4px; background: var(--panel); border: 1px solid var(--line2); border-radius: 100px; padding: 2px 4px 2px 14px; }
#urlInput { font-family: var(--mono); font-size: 11px; color: var(--ink2); background: none; border: none; outline: none; flex: 1; height: 26px; }
.btn-load { font-family: var(--mono); font-size: 9px; font-weight: 600; color: var(--ink); background: rgba(255,255,255,0.05); border: 1px solid var(--line2); padding: 0 14px; height: 24px; border-radius: 100px; cursor: pointer; }

.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.h-btn { height: 32px; padding: 0 14px; font-size: 11.5px; font-weight: 500; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all .15s; border: 1px solid var(--line2); background: none; color: var(--ink2); }
.h-btn:hover { background: var(--card); color: var(--ink); }
.h-btn-accent { background: var(--accent-d); border-color: rgba(79,127,255,0.3); color: var(--accent); }

/* ── MAIN CONTENT ── */
main { display: flex; flex: 1; overflow: hidden; }
.workspace { flex: 1; display: flex; flex-direction: column; padding: 16px; gap: 10px; overflow: hidden; }
.video-wrap { flex: 1; background: #000; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid var(--line); }
.video-wrap iframe, .video-wrap video { width: 100%; height: 100%; position: absolute; border: none; }

.help-bar { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; height: 38px; display: flex; align-items: center; padding: 0 14px; gap: 12px; font-size: 11px; color: var(--ink2); overflow-x: auto; flex-shrink: 0; }
kbd { font-family: var(--mono); background: rgba(255,255,255,.07); padding: 2px 6px; border-radius: 4px; color: var(--ink); border: 1px solid var(--line2); }

/* ── SIDEBAR ── */
.sidebar { width: 380px; flex-shrink: 0; border-left: 1px solid var(--line); background: var(--surface); display: flex; flex-direction: column; }
.sidebar-top { padding: 16px; border-bottom: 1px solid var(--line); }
.tc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.tc-pill { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; cursor: pointer; }
.tc-pill.active { border-color: var(--accent); background: var(--accent-d); }
.tc-pill .lbl { font-size: 8px; font-weight: 600; color: var(--ink3); text-transform: uppercase; margin-bottom: 4px; }
.tc-pill .val { font-family: var(--mono); font-size: 14px; }

.field { width: 100%; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 11px; color: var(--ink); font-size: 13px; outline: none; margin-bottom: 8px; resize: none; }
.action-row { display: grid; grid-template-columns: 1fr 2fr; gap: 8px; margin-top: 4px; }
.img-btn { height: 38px; background: var(--panel); border: 1px solid var(--line2); color: var(--ink2); border-radius: 10px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 6px; }
.save-btn { height: 38px; background: var(--accent); border: none; color: #fff; font-weight: 600; border-radius: 10px; cursor: pointer; font-size: 13px; }
#pImg { max-width: 100%; border-radius: 8px; display: none; margin-top: 10px; border: 1px solid var(--line); }

.cell-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.fb-card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px; position: relative; }
.fb-card.done { opacity: 0.3; filter: grayscale(1); }
.tc-badge { font-family: var(--mono); font-size: 10px; background: var(--accent-d); color: var(--accent); padding: 3px 10px; border-radius: 6px; cursor: pointer; }
.card-header { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }

/* ── UI EXTRAS ── */
.dropdown { position: relative; }
.dd-menu { position: absolute; right: 0; top: calc(100% + 6px); background: #121216; border: 1px solid var(--line2); border-radius: 10px; padding: 5px; min-width: 180px; display: none; z-index: 300; }
.dd-menu.open { display: block; }
.dd-item { padding: 8px 10px; font-size: 12px; border-radius: 6px; cursor: pointer; display: flex; gap: 8px; color: var(--ink2); }
.dd-item:hover { background: var(--accent-d); color: var(--ink); }
.toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #1a1a20; border: 1px solid var(--line2); padding: 10px 20px; border-radius: 100px; opacity: 0; transition: .2s; z-index: 1000; font-size: 12px; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    <span class="logo-text">Antigravity</span>
  </div>

  <div class="header-center">
    <div class="report-row">
      <input id="reportName" type="text" placeholder="Tên báo cáo..." spellcheck="false">
    </div>
    <div class="url-row">
      <input type="text" id="urlInput" placeholder="Dán link video và nhấn Enter" onkeydown="if(event.key==='Enter') loadVideo()">
      <button class="btn-load" onclick="loadVideo()">LOAD</button>
    </div>
  </div>

  <div class="header-right">
    <button class="h-btn h-btn-accent" onclick="copyShareLink()">Share</button>
    <div class="dropdown">
        <button class="h-btn" onclick="toggleMenu('exportMenu')">Export</button>
        <div class="dd-menu" id="exportMenu">
            <div class="dd-item" onclick="exportPDF()">📄 PDF Report</div>
            <div class="dd-item" onclick="exportXLSX()">📊 Excel (.xlsx)</div>
        </div>
    </div>
    <div class="dropdown">
        <button class="h-btn" onclick="toggleMenu('moreMenu')">⋯</button>
        <div class="dd-menu" id="moreMenu">
            <div class="dd-item" onclick="exportJSON()">💾 Save Session</div>
            <div class="dd-item" onclick="document.getElementById('importIn').click()">📂 Open Session</div>
        </div>
    </div>
  </div>
  <input type="file" id="importIn" hidden accept=".json" onchange="importJSON(event)">
</header>

<main>
  <section class="workspace">
    <div class="video-wrap" id="vBox">
      <div id="yt-frame"></div>
      <iframe id="drive-frame" style="display:none" allowfullscreen></iframe>
      <video id="dv" controls style="display:none"></video>
    </div>
    <div class="help-bar">
      <span><kbd>Space</kbd> Play/Pause</span>
      <span><kbd>← →</kbd> ±1s</span>
      <span><kbd>Ctrl+V</kbd> Dán ảnh</span>
      <span><kbd>Ctrl+↵</kbd> Lưu nhanh</span>
      <span><kbd>Enter</kbd> Load link</span>
    </div>
  </section>

  <aside class="sidebar">
    <div class="sidebar-top">
      <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-size:11px; color:var(--ink3)">
        <span id="projTitle">No Video</span>
        <span id="progressBadge">0 / 0</span>
      </div>
      <div class="tc-row">
        <div class="tc-pill active" id="boxA" onclick="setSync('A')">
          <div class="lbl">Điểm A</div>
          <div class="val" id="valA">00:00:00</div>
        </div>
        <div class="tc-pill" id="boxB" onclick="setSync('B')">
          <div class="lbl">Điểm B (Khoảng)</div>
          <div class="val" id="valB">--:--:--</div>
        </div>
      </div>
      <textarea id="noteText" class="field" placeholder="Ghi chú feedback..." rows="3"></textarea>
      
      <div class="action-row">
        <button class="img-btn" onclick="document.getElementById('fileIn').click()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            Ảnh
        </button>
        <button class="save-btn" onclick="saveFb()">+ Thêm Nhận Xét</button>
      </div>
      <input type="file" id="fileIn" hidden accept="image/*" onchange="handleFile(event)">
      <img id="pImg"/>
    </div>
    <div class="cell-list" id="fbList"></div>
  </aside>
</main>

<div class="toast" id="toast"></div>

<script>
let feedbacks = [], videoType = '', videoUrl = '', syncTarget = 'A', currentImg = null, ytPlayer = null;

function toast(m) {
  const t = document.getElementById('toast');
  t.innerText = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function fmt(s) {
  s = Math.floor(s || 0);
  return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(v => String(v).padStart(2,'0')).join(':');
}

function toggleMenu(id) {
  document.querySelectorAll('.dd-menu').forEach(el => { if (el.id !== id) el.classList.remove('open'); });
  const m = document.getElementById(id); if(m) m.classList.toggle('open');
}

document.addEventListener('click', e => { 
  if (!e.target.closest('.dropdown') && !e.target.closest('.h-btn')) 
    document.querySelectorAll('.dd-menu').forEach(el => el.classList.remove('open')); 
});

function setSync(t) {
  syncTarget = t;
  document.getElementById('boxA').classList.toggle('active', t === 'A');
  document.getElementById('boxB').classList.toggle('active', t === 'B');
}

setInterval(() => {
  const now = getTime();
  if (syncTarget === 'A') document.getElementById('valA').innerText = fmt(now);
  if (syncTarget === 'B') document.getElementById('valB').innerText = fmt(now);
}, 200);

function getTime() {
  if (videoType === 'native') return document.getElementById('dv').currentTime || 0;
  if (videoType === 'yt' && ytPlayer?.getCurrentTime) return ytPlayer.getCurrentTime();
  return 0;
}

function setTime(sec) {
  if (videoType === 'native') document.getElementById('dv').currentTime = sec;
  if (videoType === 'yt' && ytPlayer) ytPlayer.seekTo(sec, true);
}

function loadVideo() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  videoUrl = url;
  ['dv','yt-frame','drive-frame'].forEach(id => {
    const el = document.getElementById(id); el.style.display = 'none';
    if(id==='yt-frame') el.innerHTML = ''; if(id==='dv'||id==='drive-frame') el.src = '';
  });

  if (url.includes('youtube.com') || url.includes('youtu.be')) {
    videoType = 'yt';
    const id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop().split('?')[0];
    document.getElementById('yt-frame').style.display = 'block';
    document.getElementById('yt-frame').innerHTML = '<div id="player" style="width:100%;height:100%"></div>';
    ytPlayer = new YT.Player('player', { videoId: id, events: { onReady: e => { 
        const title = e.target.getVideoData().title;
        document.getElementById('projTitle').innerText = title;
        document.getElementById('reportName').value = title; // Tự động load tên video
        autoLoad(); 
    }}});
  } else if (url.includes('drive.google.com')) {
    videoType = 'drive'; document.getElementById('drive-frame').style.display = 'block';
    const m = url.match(/\/file\/d\/([^\/]+)\//);
    document.getElementById('drive-frame').src = `https://drive.google.com/file/d/${m?m[1]:''}/preview`;
    document.getElementById('projTitle').innerText = "Google Drive Video";
    document.getElementById('reportName').value = "Báo cáo Drive Video";
    autoLoad();
  } else {
    videoType = 'native'; const v = document.getElementById('dv'); v.style.display = 'block'; v.src = url;
    const name = url.split('/').pop();
    document.getElementById('projTitle').innerText = name;
    document.getElementById('reportName').value = name;
    autoLoad();
  }
}

function autoLoad() {
  const saved = localStorage.getItem('ag_v11_' + videoUrl);
  feedbacks = saved ? JSON.parse(saved).feedbacks : [];
  render();
}

function saveFb() {
  const note = document.getElementById('noteText').value.trim();
  if (!note && !currentImg) { toast('Nhập nội dung!'); return; }
  let tA = document.getElementById('valA').innerText, tB = document.getElementById('valB').innerText;
  const secA = tA.split(':').reduce((a,v) => a*60 + +v, 0);
  feedbacks.push({ id: Date.now(), tc: tB !== '--:--:--' ? `${tA} → ${tB}` : tA, sec: secA, note, img: currentImg, done: false });
  render(); document.getElementById('noteText').value = ''; document.getElementById('pImg').style.display = 'none'; currentImg = null;
  document.getElementById('valB').innerText = '--:--:--'; setSync('A');
  saveLocal(); toast('✓ Đã lưu');
}

function render() {
  const list = document.getElementById('fbList');
  document.getElementById('progressBadge').innerText = `${feedbacks.filter(f=>f.done).length} / ${feedbacks.length}`;
  list.innerHTML = [...feedbacks].sort((a,b)=>a.sec-b.sec).map(f=>`
    <div class="fb-card ${f.done?'done':''}">
      <div class="card-header">
        <div class="tc-badge" onclick="setTime(${f.sec})">${f.tc}</div>
        <div style="display:flex; gap:10px">
            <div style="cursor:pointer; color:var(--green)" onclick="toggleDone(${f.id})">✓</div>
            <div style="cursor:pointer; color:var(--red)" onclick="delFb(${f.id})">✕</div>
        </div>
      </div>
      <div style="font-size:13px; line-height:1.5; white-space:pre-wrap;">${f.note}</div>
      ${f.img ? `<img src="${f.img}" style="width:100%; border-radius:6px; margin-top:8px">` : ''}
    </div>`).join('');
}

function toggleDone(id) { const f = feedbacks.find(x=>x.id===id); if(f){ f.done=!f.done; render(); saveLocal(); } }
function delFb(id) { feedbacks = feedbacks.filter(f=>f.id!==id); render(); saveLocal(); }
function saveLocal() { localStorage.setItem('ag_v11_' + videoUrl, JSON.stringify({ feedbacks })); }

function exportXLSX() {
  if (!feedbacks.length) return toast('Không có dữ liệu!');
  const data = feedbacks.map(f => ({ "Thời gian": f.tc, "Nhận xét": f.note, "Xong": f.done?'X':' ' }));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Feedback");
  XLSX.writeFile(wb, `${document.getElementById('reportName').value || 'Report'}.xlsx`);
}

function exportPDF() {
  if (!feedbacks.length) return toast('Không có dữ liệu!');
  const el = document.createElement('div'); el.style.padding = '30px'; el.style.background = '#fff'; el.style.color = '#000';
  el.innerHTML = `<h1 style="margin-bottom:20px">${document.getElementById('reportName').value || 'Feedback'}</h1>` + 
    feedbacks.sort((a,b)=>a.sec-b.sec).map(f => `<div style="margin-bottom:25px; border-bottom:1px solid #eee; padding-bottom:15px; page-break-inside:avoid;">
      <b style="color:#4f7fff; font-family:monospace">[${f.tc}]</b><br><div style="margin-top:5px">${f.note.replace(/\n/g,'<br>')}</div>
      ${f.img ? `<br><img src="${f.img}" style="max-width:100%; border-radius:5px; margin-top:10px">` : ''}
    </div>`).join('');
  html2pdf().from(el).set({ margin: 10, filename: 'Report.pdf', html2canvas: { scale: 2 }, jsPDF: { format: 'a4' } }).save();
}

function copyShareLink() {
    const url = document.getElementById('urlInput').value.trim();
    if(!url) return toast('❌ Dán link video trước');
    const shareUrl = new URL(window.location.href.split('?')[0]);
    shareUrl.searchParams.set('video', url);
    navigator.clipboard.writeText(shareUrl.toString()).then(() => toast('🚀 Đã copy link share!'));
}

function handleFile(e) {
  const reader = new FileReader();
  reader.onload = ex => { currentImg=ex.target.result; const p=document.getElementById('pImg'); p.src=currentImg; p.style.display='block'; };
  reader.readAsDataURL(e.target.files[0]);
}

document.addEventListener('paste', e => {
  const item = Array.from(e.clipboardData.items).find(x=>x.type.startsWith('image/'));
  if (item) {
    const reader = new FileReader();
    reader.onload = ex => { currentImg=ex.target.result; const p=document.getElementById('pImg'); p.src=currentImg; p.style.display='block'; };
    reader.readAsDataURL(item.getAsFile());
  }
});

document.addEventListener('keydown', e => {
  const typing = ['TEXTAREA','INPUT'].includes(document.activeElement.tagName);
  if (e.code === 'Space' && !typing) { e.preventDefault(); if (videoType==='native') { const v=document.getElementById('dv'); v.paused?v.play():v.pause(); } if (videoType==='yt'&&ytPlayer) { ytPlayer.getPlayerState()===1?ytPlayer.pauseVideo():ytPlayer.playVideo(); } }
  if (e.key==='Enter' && e.ctrlKey) saveFb();
});

function exportJSON() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify({feedbacks},null,2)],{type:'application/json'})); a.download = `Session.json`; a.click(); }
function importJSON(e) { const reader = new FileReader(); reader.onload = ex => { try { feedbacks=JSON.parse(ex.target.result).feedbacks||[]; render(); toast('✓ Session loaded'); } catch { toast('❌ Lỗi file'); } }; reader.readAsText(e.target.files[0]); }

var tag = document.createElement('script'); tag.src = 'https://www.youtube.com/iframe_api'; document.head.appendChild(tag);
</script>
</body>
</html>
