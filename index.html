<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Antigravity Feedback - Simple Version</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script defer src="https://player.vimeo.com/api/player.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
:root {
  --bg-deep: #050505;
  --bg-glow: radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.08), transparent 25%),
             radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08), transparent 25%);
  --glass-bg: rgba(255, 255, 255, 0.02);
  --glass-bg-hover: rgba(255, 255, 255, 0.04);
  --glass-border: rgba(255, 255, 255, 0.06);
  --glass-border-focus: rgba(255, 255, 255, 0.15);
  --inner-bg: rgba(0, 0, 0, 0.3);
  --accent-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
  --accent-glow: rgba(139, 92, 246, 0.3);
  --accent-solid: #8b5cf6;
  --green: #10B981;
  --red: #ef4444;
  --text-primary: #ffffff;
  --text-secondary: #a1a1aa;
  --text-tertiary: #71717a;
  --radius-lg: 24px;
  --radius-md: 16px;
  --radius-sm: 10px;
  --shadow-glass: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background-color: var(--bg-deep);
  background-image: var(--bg-glow);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

.app { display: grid; grid-template-rows: auto auto 1fr auto; min-height: 100vh; max-width: 1600px; margin: 0 auto; padding: 0 2rem; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 2rem 0 1rem; }
.logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
.logo span { background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.bento-panel {
  background: var(--glass-bg); backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-glass);
}

.main { display: grid; grid-template-columns: 1fr 400px; gap: 2rem; padding-bottom: 2rem; align-items: start; }
@media(max-width: 1200px) { .main { grid-template-columns: 1fr; } }

/* --- VIDEO --- */
.video-container { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; background: #000; }
.video-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; background: rgba(0,0,0,0.6); z-index: 10;}
#yt-frame, #vimeo-frame, video#dv { width: 100%; height: 100%; position: absolute; inset: 0; display: none; z-index: 1;}
video#dv { object-fit: contain; }

.tc-bar { margin-top: 1.5rem; padding: 1.2rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; }
.tc-clock { font-size: 32px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -1px; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
.status-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); }

/* --- INPUTS --- */
.panel-col { display: flex; flex-direction: column; gap: 1.5rem; height: 100%; }
input[type="text"], textarea {
  width: 100%; background: var(--inner-bg); border: 1px solid var(--glass-border); color: var(--text-primary);
  border-radius: var(--radius-sm); padding: 12px 16px; font-family: inherit; font-size: 14px; outline: none; transition: 0.2s;
}
input[type="text"]:focus, textarea:focus { border-color: var(--accent-solid); }

.time-range-group { display: flex; gap: 10px; margin-bottom: 16px; }
.tc-box {
  flex: 1; padding: 12px; background: var(--inner-bg); border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); cursor: pointer; transition: 0.2s; text-align: center; position: relative;
}
.tc-box.active { border-color: var(--accent-solid); background: rgba(139, 92, 246, 0.15); transform: scale(1.02); }
.tc-label { display: block; font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; font-weight: 700; }
.tc-time-input {
  background: transparent; border: none; color: var(--text-primary);
  font-size: 20px; font-weight: 800; text-align: center; width: 100%; outline: none; pointer-events: none;
}
.tc-box.active .tc-label { color: var(--accent-solid); }

.btn { padding: 12px 24px; border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
.btn-primary { background: var(--accent-grad); color: #fff; width: 100%; margin-top: 12px; }

/* --- LIST --- */
.fb-panel { display: flex; flex-direction: column; overflow: hidden; }
.fp-head { padding: 1.25rem; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; }
.fp-list { overflow-y: auto; max-height: 500px; }
.fb-item { padding: 1.25rem; border-bottom: 1px solid var(--glass-border); display: flex; gap: 14px; }
.fb-tc-btn { flex-shrink: 0; padding: 4px 10px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); border-radius: 100px; font-size: 12px; height: fit-content; }

.footer { text-align: center; padding: 2rem 0; color: var(--text-tertiary); font-size: 13px; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #18181b; border: 1px solid #3f3f46; color: #fff; padding: 10px 20px; border-radius: 100px; opacity: 0; transition: 0.3s; z-index: 999; }
.toast.show { opacity: 1; bottom: 50px; }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <div class="logo">🚀 <span>Antigravity</span> Feedback</div>
  </header>

  <main class="main">
    <div class="video-col">
      <div class="video-container bento-panel" id="videoBox">
        <div class="video-placeholder" id="placeholder"><p>Dán link vào ô bên phải để bắt đầu</p></div>
        <div id="yt-frame"></div><div id="vimeo-frame"></div><video id="dv" controls></video>
      </div>
      <div class="tc-bar bento-panel">
        <div class="tc-clock" id="tcClock">00:00:00</div>
        <div style="flex:1"></div>
        <div class="status-dot"></div>
        <div style="font-size: 13px; color: var(--text-secondary)">Smarter & Simpler Sync</div>
      </div>
    </div>

    <div class="panel-col">
      <div class="url-panel bento-panel" style="padding:1.25rem; display:flex; gap:8px;">
        <input type="text" id="urlInput" placeholder="Dán link YT/Drive..."/>
        <button class="btn btn-primary" onclick="loadVideo()" style="width:auto; margin:0">Load</button>
      </div>

      <div class="fb-panel bento-panel">
        <div class="fp-head"><h3>Ghi chú Feedback</h3> <span id="fbCount">0</span></div>
        <div style="padding: 1.25rem; background: rgba(0,0,0,0.2)">
          <div class="time-range-group">
            <div class="tc-box active" id="boxIn" onclick="setSyncTarget('A')">
              <span class="tc-label">Từ (A) - LIVE</span>
              <input type="text" class="tc-time-input" id="tcIn" value="00:00:00"/>
            </div>
            <div class="tc-box" id="boxOut" onclick="setSyncTarget('B')">
              <span class="tc-label">Đến (B)</span>
              <input type="text" class="tc-time-input" id="tcOut" value="--:--:--"/>
            </div>
          </div>
          <textarea id="noteText" placeholder="Gõ nhận xét tại đây..." onfocus="setSyncTarget(null)"></textarea>
          <button class="btn btn-primary" onclick="addFeedback()">Lưu Feedback (Enter)</button>
        </div>
        <div class="fp-list" id="fbList"></div>
      </div>
      
      <div style="display:flex; gap:8px">
          <button class="btn" style="flex:1; background: var(--inner-bg)" onclick="exportXLSX()">Excel</button>
          <button class="btn" style="flex:1; background: var(--inner-bg)" onclick="exportPDF()">PDF</button>
      </div>
    </div>
  </main>

  <footer class="footer">Xây dựng theo triết lý <span>Antigravity</span> - Smarter but Simple</footer>
</div>

<div class="toast" id="toast"></div>

<script>
var feedbacks=[], videoUrl='', videoType='', ytPlayer=null, vimeoPlayer=null, nativeVid=null, clockTimer=null;
var syncTarget = 'A'; // 'A', 'B', hoặc null

function toast(m){ 
    const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2000);
}

function fmt(s){
    s=Math.floor(s||0);
    return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(v=>String(v).padStart(2,'0')).join(':');
}

function setSyncTarget(target) {
    syncTarget = target;
    document.getElementById('boxIn').classList.toggle('active', target === 'A');
    document.getElementById('boxOut').classList.toggle('active', target === 'B');
    
    const labelA = document.querySelector('#boxIn .tc-label');
    const labelB = document.querySelector('#boxOut .tc-label');
    labelA.innerText = (target === 'A') ? 'Từ (A) - LIVE' : 'Từ (A)';
    labelB.innerText = (target === 'B') ? 'Đến (B) - LIVE' : 'Đến (B)';

    if(target) toast(`Đang đồng bộ ô ${target}`);
}

function getCurrentTime() {
    if (nativeVid) return nativeVid.currentTime;
    if (ytPlayer && ytPlayer.getCurrentTime) return ytPlayer.getCurrentTime();
    if (window.vimeoTime) return window.vimeoTime;
    return 0;
}

function startClock(){
    if(clockTimer) clearInterval(clockTimer);
    clockTimer = setInterval(() => {
        const now = getCurrentTime();
        document.getElementById('tcClock').innerText = fmt(now);
        
        if(syncTarget === 'A') document.getElementById('tcIn').value = fmt(now);
        if(syncTarget === 'B') document.getElementById('tcOut').value = fmt(now);
    }, 200);
}

// Tận dụng cơ chế update của Vimeo API
window.addEventListener('message', function(e){
    try { 
        const d = JSON.parse(e.data); 
        if(d.event === 'timeupdate') window.vimeoTime = d.data.seconds;
    } catch(err){}
});

function loadVideo(){
    const url = document.getElementById('urlInput').value.trim();
    if(!url) return toast('⚠️ Chưa có link');
    
    document.getElementById('placeholder').style.display='none';
    document.getElementById('dv').style.display='none';
    document.getElementById('yt-frame').innerHTML = '';
    
    if(url.includes('youtube.com') || url.includes('youtu.be')){
        const id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
        document.getElementById('yt-frame').style.display='block';
        ytPlayer = new YT.Player('yt-frame', { height: '100%', width: '100%', videoId: id });
        videoType = 'yt';
    } else if(url.includes('vimeo')){
        const id = url.split('/').pop();
        document.getElementById('vimeo-frame').style.display='block';
        document.getElementById('vimeo-frame').innerHTML = `<iframe src="https://player.vimeo.com/video/${id}?api=1" width="100%" height="100%" frameborder="0"></iframe>`;
        videoType = 'vimeo';
    } else {
        nativeVid = document.getElementById('dv');
        nativeVid.style.display='block';
        nativeVid.src = url;
        videoType = 'native';
    }
    videoUrl = url;
    startClock();
    toast('✅ Đã tải video');
}

function addFeedback(){
    const note = document.getElementById('noteText').value.trim();
    if(!note) return toast('⚠️ Nhập nội dung đã');
    
    const tA = document.getElementById('tcIn').value;
    const tB = document.getElementById('tcOut').value;
    const tc = (tB === '--:--:--') ? tA : `${tA} - ${tB}`;
    
    feedbacks.push({ tc, note, id: Date.now() });
    render();
    
    // Reset cho phát tiếp theo
    document.getElementById('noteText').value = '';
    document.getElementById('tcOut').value = '--:--:--';
    setSyncTarget('A');
    toast('💾 Đã lưu!');
}

function render(){
    const list = document.getElementById('fbList');
    list.innerHTML = feedbacks.map(f => `
        <div class="fb-item">
            <div class="fb-tc-btn">${f.tc}</div>
            <div style="font-size:14px">${f.note}</div>
        </div>
    `).join('');
    document.getElementById('fbCount').innerText = feedbacks.length;
}

// Phím tắt Space để Play/Pause (khi không gõ note)
document.addEventListener('keydown', (e) => {
    if(e.code === 'Space' && document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.tagName !== 'INPUT'){
        e.preventDefault();
        if(nativeVid) nativeVid.paused ? nativeVid.play() : nativeVid.pause();
        // YT và Vimeo cần API gọi sâu hơn, nhưng cơ bản space sẽ hoạt động nếu click vào iframe trước
    }
    if(e.key === 'Enter' && e.ctrlKey) addFeedback();
});

// Load YT API
var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
var firstScriptTag = document.getElementsByTagName('script')[0]; firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
</script>
</body>
</html>
